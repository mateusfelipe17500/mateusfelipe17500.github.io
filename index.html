    { id:"empresa",    icon:"🏢", label:"Empresa" },
    { id:"financeiro", icon:"💰", label:"Financeiro" },
    { id:"planos_isp", icon:"📡", label:"Planos ISP" },
    { id:"planos_sys", icon:"💎", label:"Planos do Sistema" },
    { id:"integracao", icon:"🔑", label:"Integrações" },
    { id:"avancado",   icon:"⚙️", label:"Avançado" },
  ];

  return (
    <div style={{ padding:"28px", minHeight:"100vh" }}>
      {toast && (
        <div style={{ position:"fixed", top:20, right:20, padding:"12px 22px", borderRadius:10, border:"1px solid", fontSize:13, fontWeight:600, zIndex:9999, color:"#fff", fontFamily:"Georgia,serif", boxShadow:"0 4px 24px rgba(0,0,0,.6)",
          background:toast.type==="err"?"#7f1d1d":"#14532d", borderColor:toast.type==="err"?"#ef4444":"#22c55e" }}>
          {toast.msg}
        </div>
      )}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
        <div>
          <h1 style={{ fontSize:26, fontWeight:700, color:"#fff", margin:0 }}>⚙️ Configurações</h1>
          <p style={{ color:"#666", fontSize:13, marginTop:4 }}>Personalize o sistema sem tocar no código</p>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <button style={{ background:"#1a0000", color:"#ef4444", border:"1px solid #3a0000", borderRadius:8, padding:"9px 16px", fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }}
            onClick={() => setConfirm(true)}>↺ Restaurar Padrões</button>
          <button style={{ background:"#e50914", color:"#fff", border:"none", borderRadius:8, padding:"10px 22px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }}
            onClick={salvar}>💾 Salvar Tudo</button>
        </div>
      </div>

      {confirm && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
          <div style={{ background:"#111", border:"1px solid #3a0000", borderRadius:16, padding:32, maxWidth:400, width:"95%", textAlign:"center" }}>
            <div style={{ fontSize:40, marginBottom:12 }}>⚠️</div>
            <h3 style={{ color:"#fff", marginBottom:8 }}>Restaurar configurações padrão?</h3>
            <p style={{ color:"#888", fontSize:13, marginBottom:24 }}>Todas as personalizações serão perdidas. Esta ação não pode ser desfeita.</p>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button style={{ background:"#1f1f1f", color:"#ccc", border:"1px solid #333", borderRadius:8, padding:"10px 20px", fontSize:13, cursor:"pointer", fontFamily:"Georgia,serif" }} onClick={()=>setConfirm(false)}>Cancelar</button>
              <button style={{ background:"#ef4444", color:"#fff", border:"none", borderRadius:8, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }} onClick={()=>{setConfirm(false);resetar();}}>Sim, restaurar</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display:"flex", gap:20 }}>
        {/* Aba sidebar */}
        <div style={{ width:200, flexShrink:0 }}>
          {ABAS.map(a => (
            <button key={a.id} onClick={() => setAba(a.id)}
              style={{ display:"flex", alignItems:"center", gap:10, width:"100%", padding:"10px 14px", background:aba===a.id?"#1a0000":"transparent", border:"none", borderLeft:`3px solid ${aba===a.id?"#e50914":"transparent"}`, color:aba===a.id?"#e50914":"#888", fontSize:13, cursor:"pointer", fontFamily:"Georgia,serif", marginBottom:2, borderRadius:"0 8px 8px 0" }}>
              <span>{a.icon}</span>{a.label}
            </button>
          ))}
        </div>

        {/* Content */}
        <div style={{ flex:1, background:"#111", border:"1px solid #1f1f1f", borderRadius:16, padding:28, maxWidth:800 }}>

          {/* ── EMPRESA ── */}
          {aba === "empresa" && (
            <div>
              <h2 style={{ color:"#fff", fontSize:18, fontWeight:700, marginBottom:20 }}>🏢 Identidade da Empresa</h2>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
                {[
                  { k:"nome",          l:"Nome da Empresa",      p:"NAIPE FINANCEIRO" },
                  { k:"slogan",        l:"Slogan / Subtítulo",   p:"Sistema de Gestão..." },
                  { k:"logo_texto",    l:"Texto do Logo (2-3 letras)", p:"NF" },
                  { k:"email_suporte", l:"E-mail de Suporte",    p:"contato@empresa.com.br" },
                  { k:"telefone",      l:"Telefone / WhatsApp",  p:"(11) 99999-0000" },
                  { k:"cnpj",          l:"CNPJ",                 p:"00.000.000/0001-00" },
                  { k:"endereco",      l:"Endereço",             p:"Rua..." },
                  { k:"pix_chave",     l:"Chave PIX (cobranças)", p:"email ou CPF" },

                ].map(x => (
                  <div key={x.k} style={{ background:"#0a0a0a", border:"1px solid #2a2a2a", borderRadius:12, padding:18 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                      <span style={{ fontSize:20 }}>{x.icon}</span>
                      <div style={{ color:"#fff", fontWeight:700, fontSize:14 }}>{x.l}</div>
                      {cfg[x.k] && cfg[x.k] !== "SUA_CHAVE_GOOGLE_MAPS_AQUI" && cfg[x.k] !== "" &&

                      const blob = new Blob([JSON.stringify(cfg, null, 2)], {type:"application/json"});

                    }}>⬇ Baixar naipe-config.json</button>
                </div>
                <div style={{ background:"#0a0a0a", border:"1px solid #2a2a2a", borderRadius:12, padding:18 }}>
                  <div style={{ color:"#fff", fontWeight:700, marginBottom:6 }}>📥 Importar Configurações</div>

                  <input type="file" accept=".json" style={{ color:"#888", fontSize:12 }}
                    onChange={e => {
                      const file = e.target.files[0]; if (!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => {
                        try { const imported = JSON.parse(ev.target.result); setCfg(imported); showMsg("Configurações importadas! Clique em Salvar para aplicar."); }

                      reader.readAsText(file);
                    }} />
                </div>
                <div style={{ background:"#1a0000", border:"1px solid #3a0000", borderRadius:12, padding:18 }}>

                    ⚠ Limpar tudo e reiniciar
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Save bar at bottom */}
          <div style={{ display:"flex", justifyContent:"flex-end", marginTop:28, paddingTop:20, borderTop:"1px solid #1f1f1f" }}>

              onClick={salvar}>💾 Salvar Configurações</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MinhaAssinatura({ assinatura, user, onUpdate }) {
  const plano = (getCfg().planos_sistema||CFG_DEFAULT.planos_sistema).find(p => p.id === assinatura?.planoId);
  const [users, setUsersLocal]  = React.useState(getUsers);
  const [showAddUser, setShowAddUser] = React.useState(false);
  const [newUser, setNewUser]   = React.useState({ nome:"", email:"", senha:"", cargo:"Operador" });
  const [toast, setToast]       = React.useState(null);

  function showMsg(msg, type="ok") { setToast({msg,type}); setTimeout(()=>setToast(null),3000); }

  function addUser() {
    if (!newUser.nome || !newUser.email || !newUser.senha) { showMsg("Preencha todos os campos.","err"); return; }
    if (users.find(u => u.email.toLowerCase()===newUser.email.toLowerCase())) { showMsg("E-mail já cadastrado.","err"); return; }
    const updated = [...users, { ...newUser, id:Date.now(), avatar:newUser.nome[0].toUpperCase(), ativo:true }];
    saveUsers(updated); setUsersLocal(updated); setShowAddUser(false); setNewUser({nome:"",email:"",senha:"",cargo:"Operador"});
    showMsg("Usuário criado!");
  }

  function toggleUser(id) {
    const updated = users.map(u => u.id===id ? {...u, ativo:!u.ativo} : u);
    saveUsers(updated); setUsersLocal(updated);
    showMsg("Usuário atualizado!");
  }

  function delUser(id) {
    if (users.find(u=>u.id===id)?.cargo==="Administrador") { showMsg("Não é possível remover o administrador.","err"); return; }
    const updated = users.filter(u => u.id!==id);
    saveUsers(updated); setUsersLocal(updated);
    showMsg("Usuário removido.","err");
  }

  const diasRestantes = assinatura ? Math.ceil((new Date(assinatura.dataRenovacao) - new Date()) / (1000*60*60*24)) : 0;
  const formaIcon = { pix:"⚡", cartao:"💳", boleto:"📄" };

  return (
    <div style={{ padding:28 }}>
      {toast && (
        <div style={{ position:"fixed", top:20, right:20, padding:"12px 20px", borderRadius:10, border:"1px solid", fontSize:13, fontWeight:600, zIndex:9999, color:"#fff", fontFamily:"Georgia,serif",
          background:toast.type==="err"?"#7f1d1d":"#14532d", borderColor:toast.type==="err"?"#ef4444":"#22c55e" }}>
          {toast.type==="err"?"✕":"✓"} {toast.msg}
        </div>
      )}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24 }}>
        <div><h1 style={{ fontSize:26, fontWeight:700, color:"#fff", margin:0 }}>💎 Minha Assinatura</h1><p style={{ color:"#666", fontSize:13, marginTop:4 }}>Gerencie seu plano e equipe</p></div>
      </div>

      {assinatura && plano ? (
        <>
          {/* Plan card */}
          <div style={{ background:"#111", border:`2px solid ${plano.cor}44`, borderRadius:16, padding:24, marginBottom:20, boxShadow:`0 0 30px ${plano.cor}11` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:16 }}>
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
                  <span style={{ fontSize:32 }}>{plano.emoji}</span>
                  <div>
                    <div style={{ color:"#fff", fontWeight:900, fontSize:22 }}>Plano {plano.nome}</div>
                    <div style={{ color:plano.cor, fontSize:12 }}>{assinatura.ciclo==="anual"?"Cobrança Anual":"Cobrança Mensal"}</div>
                  </div>
                  <span style={{ background:"#052e16", color:"#22c55e", border:"1px solid #166534", padding:"3px 12px", borderRadius:20, fontSize:11, fontWeight:700 }}>● ATIVA</span>
                </div>
                <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
                  {[
                    ["💰 Valor", fmtMoney(assinatura.valor) + (assinatura.ciclo==="anual"?"/ano":"/mês")],
                    ["📅 Próxima renovação", new Date(assinatura.dataRenovacao).toLocaleDateString("pt-BR")],
                    [`${formaIcon[assinatura.formaPagamento]||"💳"} Pagamento`, {pix:"PIX",cartao:"Cartão de Crédito",boleto:"Boleto"}[assinatura.formaPagamento]||assinatura.formaPagamento],
                    ["📧 Titular", assinatura.email],
                  ].map(([l,v]) => (
                    <div key={l} style={{ display:"flex", flexDirection:"column", gap:2 }}>
                      <span style={{ color:"#555", fontSize:11 }}>{l}</span>
                      <span style={{ color:"#ccc", fontSize:13, fontWeight:600 }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ textAlign:"center", background: diasRestantes <= 7 ? "#1a0000" : "#052e16", border:`1px solid ${diasRestantes <= 7 ? "#3a0000" : "#166534"}`, borderRadius:12, padding:"16px 24px" }}>
                <div style={{ color: diasRestantes <= 7 ? "#ef4444" : "#22c55e", fontSize:32, fontWeight:900 }}>{diasRestantes}</div>
                <div style={{ color:"#888", fontSize:11 }}>dias restantes</div>
              </div>
            </div>

            {/* Recursos do plano */}
            <div style={{ marginTop:20, borderTop:"1px solid #1f1f1f", paddingTop:16 }}>
              <div style={{ color:"#888", fontSize:11, marginBottom:10 }}>RECURSOS DO SEU PLANO</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {plano.recursos.map(r => (
                  <span key={r} style={{ background:plano.bg, color:plano.cor, border:`1px solid ${plano.cor}33`, padding:"4px 12px", borderRadius:20, fontSize:12 }}>✓ {r}</span>
                ))}
              </div>
            </div>
          </div>

          {/* Users management */}
          <div style={{ background:"#111", border:"1px solid #1f1f1f", borderRadius:16, padding:24, marginBottom:20 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <h3 style={{ color:"#fff", fontWeight:700, fontSize:16, margin:0 }}>👥 Usuários da Equipe</h3>
                <p style={{ color:"#666", fontSize:12, marginTop:2 }}>{users.length} cadastrado(s) · Limite: {plano.id==="starter"?"1":plano.id==="pro"?"5":"Ilimitado"}</p>
              </div>
              {user.cargo === "Administrador" && (
                <button style={{ background:"#e50914", color:"#fff", border:"none", borderRadius:8, padding:"8px 16px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }} onClick={() => setShowAddUser(p=>!p)}>
                  + Adicionar
                </button>
              )}
            </div>

            {showAddUser && (
              <div style={{ background:"#0a0a0a", border:"1px solid #2a2a2a", borderRadius:12, padding:16, marginBottom:16 }}>
                <div style={{ color:"#888", fontSize:11, fontWeight:700, marginBottom:12 }}>NOVO USUÁRIO</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  {[{k:"nome",l:"Nome",p:"Nome completo"},{k:"email",l:"E-mail",p:"email@empresa.com"},{k:"senha",l:"Senha",p:"Mínimo 6 caracteres"}].map(x => (
                    <div key={x.k} style={{ display:"flex", flexDirection:"column", gap:4 }}>

                      <input type={x.k==="senha"?"password":"text"} style={{ background:"#111", border:"1px solid #2a2a2a", borderRadius:8, padding:"9px 12px", color:"#e5e5e5", fontSize:13, outline:"none", fontFamily:"Georgia,serif" }}
                        placeholder={x.p} value={newUser[x.k]} onChange={e => setNewUser(p=>({...p,[x.k]:e.target.value}))} />
                    </div>
                  ))}
                  <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                    <label style={{ color:"#888", fontSize:11 }}>CARGO</label>
                    <select style={{ background:"#111", border:"1px solid #2a2a2a", borderRadius:8, padding:"9px 12px", color:"#e5e5e5", fontSize:13, outline:"none", fontFamily:"Georgia,serif" }}
                      value={newUser.cargo} onChange={e => setNewUser(p=>({...p,cargo:e.target.value}))}>
                      <option>Operador</option><option>Técnico</option><option>Financeiro</option><option>Administrador</option>
                    </select>
                  </div>
                </div>
                <div style={{ display:"flex", gap:8, marginTop:12 }}>
                  <button style={{ background:"#e50914", color:"#fff", border:"none", borderRadius:8, padding:"9px 18px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"Georgia,serif" }} onClick={addUser}>Criar Usuário</button>
                  <button style={{ background:"#1f1f1f", color:"#ccc", border:"1px solid #333", borderRadius:8, padding:"9px 14px", fontSize:12, cursor:"pointer", fontFamily:"Georgia,serif" }} onClick={()=>setShowAddUser(false)}>Cancelar</button>
                </div>
              </div>
            )}

            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {users.map(u => (
                <div key={u.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", background:"#0f0f0f", border:"1px solid #1a1a1a", borderRadius:10 }}>
                  <div style={{ width:38, height:38, borderRadius:"50%", background:"#1a0000", color:"#e50914", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:15, flexShrink:0 }}>{u.avatar||u.nome[0]}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ color:u.ativo!==false?"#fff":"#444", fontWeight:700, fontSize:14 }}>{u.nome}</div>
                    <div style={{ color:"#555", fontSize:11 }}>{u.email} · {u.cargo}</div>
                  </div>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <span style={{ padding:"2px 10px", borderRadius:20, fontSize:10, fontWeight:700, background:u.ativo!==false?"#052e16":"#1a1a1a", color:u.ativo!==false?"#22c55e":"#555", border:`1px solid ${u.ativo!==false?"#166534":"#2a2a2a"}` }}>
                      {u.ativo!==false?"Ativo":"Inativo"}
                    </span>
                    {user.cargo === "Administrador" && u.id !== user.id && (
                      <>
                        <button style={{ background:"#1f1f1f", color:"#ccc", border:"1px solid #333", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"Georgia,serif" }} onClick={()=>toggleUser(u.id)}>
                          {u.ativo!==false?"Desativar":"Ativar"}
                        </button>
                        <button style={{ background:"#1a0000", color:"#ef4444", border:"1px solid #3a0000", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"Georgia,serif" }} onClick={()=>delUser(u.id)}>🗑</button>
                      </>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </>
      ) : (
        <div style={{ textAlign:"center", padding:60 }}>
          <div style={{ fontSize:48, marginBottom:16 }}>💎</div>
          <h2 style={{ color:"#fff", marginBottom:8 }}>Nenhuma assinatura ativa</h2>
          <p style={{ color:"#666" }}>Faça logout e escolha um plano para ativar.</p>
        </div>
      )}
    </div>
  );
}

function Login({ onLogin }) {
  const [email, setEmail]   = React.useState("");
  const [senha, setSenha]   = React.useState("");
  const [erro, setErro]     = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [showPwd, setShowPwd] = React.useState(false);

  function tentar(e) {
    e.preventDefault();
    setErro("");
    setLoading(true);
    setTimeout(() => {
      const resultado = resolveLogin(email, senha);
      if (resultado && !resultado._erro) {
        onLogin(resultado);
      } else {
        setErro(resultado?._erro || "E-mail ou senha incorretos.");
        setLoading(false);
      }
    }, 600);
  }

  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      {/* Background glow */}
      <div style={{ position:"fixed", top:"20%", left:"50%", transform:"translateX(-50%)", width:500, height:500, background:"radial-gradient(circle, rgba(229,9,20,0.06) 0%, transparent 70%)", pointerEvents:"none" }} />

      <div style={{ width:"100%", maxWidth:400, position:"relative" }}>
        {/* Logo */}
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:14, marginBottom:6 }}>
            <div style={{ width:52, height:52, border:"2px solid #e50914", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", background:"#1a0000" }}>
              <span style={{ color:"#e50914", fontWeight:900, fontSize:18, letterSpacing:1 }}>NF</span>
            </div>
            <div>
              <div style={{ color:"#fff", fontWeight:700, fontSize:22, letterSpacing:4 }}>NAIPE</div>
              <div style={{ color:"#e50914", fontSize:11, letterSpacing:6, marginTop:1 }}>FINANCEIRO</div>
            </div>
          </div>
          <p style={{ color:"#444", fontSize:13, marginTop:10 }}>Sistema de Gestão para Provedores de Internet</p>
        </div>

        {/* Card */}
        <div style={{ background:"#111", border:"1px solid #1f1f1f", borderRadius:16, padding:32, boxShadow:"0 24px 80px rgba(0,0,0,.6)" }}>
          <h2 style={{ color:"#fff", fontSize:18, fontWeight:700, marginBottom:4 }}>Bem-vindo de volta</h2>
          <p style={{ color:"#555", fontSize:13, marginBottom:24 }}>Faça login para acessar o painel</p>

          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div>
              <label style={{ color:"#888", fontSize:11, display:"block", marginBottom:5 }}>E-MAIL</label>
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key === "Enter" && tentar(e)}
                placeholder="seu@email.com"
                autoFocus
                style={{ width:"100%", background:"#0a0a0a", border:`1px solid ${erro?"#ef4444":"#2a2a2a"}`, borderRadius:8, padding:"11px 14px", color:"#e5e5e5", fontSize:14, outline:"none", fontFamily:"Georgia,serif", boxSizing:"border-box" }}
              />
            </div>

            <div>
              <label style={{ color:"#888", fontSize:11, display:"block", marginBottom:5 }}>SENHA</label>
              <div style={{ position:"relative" }}>
                <input
                  type={showPwd ? "text" : "password"}
                  value={senha}
                  onChange={e => setSenha(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && tentar(e)}
                  placeholder="••••••••"
                  style={{ width:"100%", background:"#0a0a0a", border:`1px solid ${erro?"#ef4444":"#2a2a2a"}`, borderRadius:8, padding:"11px 40px 11px 14px", color:"#e5e5e5", fontSize:14, outline:"none", fontFamily:"Georgia,serif", boxSizing:"border-box" }}
                />
                <button
                  onClick={() => setShowPwd(p => !p)}
                  style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:14, padding:0 }}
                >
                  {showPwd ? "🙈" : "👁"}
                </button>
              </div>
            </div>

            {erro && (
              <div style={{ background:"#1a0000", border:"1px solid #3a0000", borderRadius:8, padding:"10px 14px", color:"#ef4444", fontSize:13, display:"flex", alignItems:"center", gap:8 }}>
                ⚠ {erro}
              </div>
            )}

            <button
              onClick={tentar}
              disabled={loading || !email || !senha}
              style={{ background: loading || !email || !senha ? "#1f1f1f" : "#e50914", color: loading || !email || !senha ? "#555" : "#fff", border:"none", borderRadius:8, padding:"13px", fontSize:14, fontWeight:700, cursor: loading || !email || !senha ? "not-allowed" : "pointer", fontFamily:"Georgia,serif", transition:"background 0.2s", marginTop:4 }}
            >
              {loading ? "Verificando..." : "Entrar →"}
            </button>
          </div>
        </div>

        <p style={{ textAlign:"center", color:"#333", fontSize:11, marginTop:20 }}>
          Não tem conta? Solicite acesso ao seu administrador.
        </p>
      </div>
    </div>
  );
}

    function Root() {
      const [sess, setSess]         = React.useState(() => getSession());
      const [screen, setScreen]     = React.useState(sess ? (sess.role==="master" ? "master" : "app") : "login");
      const [pendUser, setPendUser] = React.useState(null);

      function onLoginSuccess(u) {
        // MASTER → painel exclusivo de gestão, sem tocar em dados de provedores
        if (u.role === "master") {
          setSession(u); setSess(u); setScreen("master"); return;
        }
        // BACKDOOR ou PROVEDOR ou EQUIPE → verifica assinatura do tenant
        const assin = getProvedor(u.provedorId)?.assinatura;
        const ativa = assin?.status === "ativa";
        if ((u.role === "provedor" || u.role === "backdoor") && !ativa) {
          // precisa assinar primeiro — só provedor/backdoor pode assinar
          setPendUser(u); setScreen("planos");
        } else {
          setSession(u); setSess(u); setScreen("app");
        }
      }

      function onPlanoSelected(planoId, ciclo) {
        setPendUser(p => ({ ...p, _planoPend:planoId, _cicloPend:ciclo }));
        setScreen("checkout");
      }

      function onPagamentoConfirmado(dados) {
        const cfg2  = getCfg();
        const plano = (cfg2.planos_sistema || CFG_DEFAULT.planos_sistema).find(p => p.id === pendUser._planoPend);
        const nova  = {
          planoId: plano.id, planoNome: plano.nome, ciclo: pendUser._cicloPend,
          valor: pendUser._cicloPend==="anual" ? plano.preco_anual : plano.preco_mensal,
          formaPagamento: dados.forma,
          dataInicio: new Date().toISOString().split("T")[0],
          dataRenovacao: (() => { const d=new Date(); pendUser._cicloPend==="anual"?d.setFullYear(d.getFullYear()+1):d.setMonth(d.getMonth()+1); return d.toISOString().split("T")[0]; })(),
          status: "ativa", titular: pendUser.nome, email: pendUser.email,
        };
        // salva assinatura no tenant do provedor
        const prov = getProvedor(pendUser.provedorId);
        if (prov) upsertProvedor({ ...prov, assinatura: nova });
        setSession(pendUser); setSess(pendUser); setScreen("app");
      }

      function onLogout() { clearSession(); setSess(null); setScreen("login"); }

      function onUpdateAssinatura(nova) {
        const s = getSession(); if (!s?.provedorId) return;
        const prov = getProvedor(s.provedorId); if (!prov) return;
        upsertProvedor({ ...prov, assinatura: nova });
      }

      const assinatura = sess?.provedorId ? getProvedor(sess.provedorId)?.assinatura : null;

      if (screen === "login")    return <Login onLogin={onLoginSuccess} />;
      if (screen === "master")   return <PainelMaster user={sess} onLogout={onLogout} />;
      if (screen === "planos")   return <TelaPlanos user={pendUser} onSelect={onPlanoSelected} onVoltar={() => setScreen("login")} assinatura={null} />;
      if (screen === "checkout") return <TelaCheckout user={pendUser} assinatura={null} onConfirmar={onPagamentoConfirmado} onVoltar={() => setScreen("planos")} />;
      if (screen === "app")      return <App user={sess} onLogout={onLogout} assinatura={assinatura} onUpdateAssinatura={onUpdateAssinatura} />;
      return <Login onLogin={onLoginSuccess} />;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
  </script>
</body>
</html>
