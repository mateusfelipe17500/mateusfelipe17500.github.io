  <script>
    function showFatalError(icon, title, msg) {
      var r = document.getElementById('root');
      if (r) r.innerHTML =
        '<div style="min-height:100vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;font-family:Georgia,serif;text-align:center">' +

        '<p style="color:#888;font-size:14px;max-width:380px;line-height:1.6;margin-bottom:24px">' + msg + '</p>' +
        '<button onclick="location.reload()" style="background:#e50914;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:Georgia,serif">🔄 Tentar novamente</button>' +
        '</div>';
    }
    window.__loadErrors = 0;
    window.addEventListener('error', function(e) {
      if (e.filename && (e.filename.includes('cdn') || e.filename.includes('unpkg') || e.filename.includes('jsdelivr'))) {
        window.__loadErrors++;
        if (window.__loadErrors >= 2) {
          showFatalError('📶', 'Erro ao carregar o sistema',
            'Não foi possível carregar os arquivos necessários. Verifique sua conexão com a internet e recarregue a página.');
        }
      }
    }, true);
  </script>

// ─── Tenant storage ───────────────────────────────────────────────────────────
function getProvedores() {
  try { const s = localStorage.getItem("naipe_provedores"); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveProvedores(list) {
  try { localStorage.setItem("naipe_provedores", JSON.stringify(list)); } catch {}
}
function getProvedor(id) { return getProvedores().find(p => p.id === id) || null; }
function upsertProvedor(prov) {
  const list = getProvedores();
  const i    = list.findIndex(p => p.id === prov.id);
  if (i >= 0) list[i] = prov; else list.push(prov);
  saveProvedores(list);
}

// ─── Per-tenant data (clientes, OS, equip, assinatura, config, users) ─────────
function tKey(pid, k) { return `nt_${pid}_${k}`; }
function tGet(pid, k, fb=null) {
  try { const s=localStorage.getItem(tKey(pid,k)); return s?JSON.parse(s):fb; } catch { return fb; }
}
function tSet(pid, k, v) {
  try { localStorage.setItem(tKey(pid,k), JSON.stringify(v)); } catch {}
}

// ─── Tenant users (equipe do provedor) ───────────────────────────────────────
function getTenantUsers(pid) {
  const saved = tGet(pid, "users", null);
  if (saved) return saved;
  const prov  = getProvedor(pid);
  if (!prov)  return [];
  return [{ id:pid*10000+1, nome:prov.nome, email:prov.email, senha:prov.senha, cargo:"Administrador", avatar:prov.nome[0].toUpperCase(), ativo:true }];
}
function saveTenantUsers(pid, u) { tSet(pid, "users", u); }

}

// ─── resolveLogin — chama-se na tela de login ─────────────────────────────────
function resolveLogin(email, senha) {
  const em = email.toLowerCase().trim();

  // 1 ── MASTER
  if (em === _MASTER.email && senha === _MASTER.senha) {
    return { role:"master", id:0, nome:"MASTER", cargo:"Master", avatar:"★", email:em, provedorId:null };
  }

  // 2 ── BACKDOOR  (email do backdoor + TOKEN::ID_PROVEDOR)
  if (em === _MASTER.backdoor_email) {
    const parts = senha.split("::");
    if (parts.length === 2 && parts[0] === _MASTER.backdoor_token) {
      const pid  = Number(parts[1]);
      const prov = getProvedor(pid);
      if (!prov)  return { _erro: "Provedor #" + pid + " não encontrado." };
      if (!prov.ativo) return { _erro: "Provedor #" + pid + " está suspenso." };
      return { role:"backdoor", id:pid*10000, provedorId:pid, nome:"[SUPORTE] "+prov.nome, cargo:"Administrador", avatar:"⚙", email:prov.email };
    }
    return { _erro: "Token inválido." };
  }

  // 3 ── PROVEDOR (titular do tenant)
  const provedores = getProvedores();
  const prov = provedores.find(p => p.email.toLowerCase()===em && p.senha===senha && p.ativo!==false);
  if (prov) {
    return { role:"provedor", id:prov.id, provedorId:prov.id, nome:prov.nome, cargo:"Administrador", avatar:prov.nome[0].toUpperCase(), email:prov.email };
  }

  // 4 ── EQUIPE (criada pelo provedor)
  for (const p of provedores) {
    if (p.ativo===false) continue;
    const u = getTenantUsers(p.id).find(x => x.email.toLowerCase()===em && x.senha===senha && x.ativo!==false);
    if (u) {
      return { role:"equipe", id:u.id, provedorId:p.id, nome:u.nome, cargo:u.cargo, avatar:u.avatar||u.nome[0].toUpperCase(), email:u.email };
    }
  }

  return null;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const now = () => new Date();
const nowDay = () => now().getDate();
const nowMonth = () => now().getMonth() + 1;
const nowYear = () => now().getFullYear();

function fmt(v) {
  return Number(v).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}
function fmtDate(s) {
  if (!s) return "—";
  const [y, m, d] = s.split("-");
  return `${d}/${m}/${y}`;
}
function calcStatus(c) {
  const diff = nowDay() - c.vencimento;
  if (diff > 10) return "inadimplente";
  if (diff > 0)  return "vencido";
  if (diff >= -3) return "pre_alerta";
  return "em_dia";
}
function isAnivNasc(c) {
  if (!c.dataNascimento) return false;
  const [,m,d] = c.dataNascimento.split("-").map(Number);
  return m === nowMonth() && d === nowDay();
}
function isAnivContrato(c) {
  const [y,m,d] = c.dataInicio.split("-").map(Number);
  return m === nowMonth() && d === nowDay() && nowYear() - y > 0;
}
function mesesFid(c) {
  const [y,m] = c.dataInicio.split("-").map(Number);
  return (nowYear() - y) * 12 + (nowMonth() - m);
}
function anosFid(c) {
  const [y,m,d] = c.dataInicio.split("-").map(Number);
  return Math.floor((now() - new Date(y,m-1,d)) / (1000*60*60*24*365));
}
function totalPago(c) {
  return (c.pagamentos || []).filter(p => p.pago).reduce((s,p) => s + p.valor, 0);
}
function totalAberto(c) {
  return (c.pagamentos || []).filter(p => !p.pago).reduce((s,p) => s + p.valor, 0);
}
function qtdAberto(c) {
  return (c.pagamentos || []).filter(p => !p.pago).length;
}
function vencContrato(c) {
  if (c.modalidade !== "Anual") return null;
  const [y,m,d] = c.dataInicio.split("-").map(Number);
  return new Date(y+1,m-1,d).toISOString().split("T")[0];
}
function contratoVencendo(c) {
  if (c.modalidade !== "Anual") return false;
  const v = new Date(vencContrato(c));
  const diff = Math.ceil((v - now()) / (1000*60*60*24));
  return diff >= 0 && diff <= 30;
}
function contratoVencido(c) {
  if (c.modalidade !== "Anual") return false;
  return new Date(vencContrato(c)) < now();
}

  function saveClient(data) {
    if (data.id) {
      setClients(p => p.map(c => c.id === data.id ? { ...data, status: calcStatus(data) } : c));
      toast("Assinante atualizado!");
    } else {
      const nc = { ...data, id: Date.now(), status: calcStatus(data), pagamentos: [], notas: "" };
      setClients(p => [...p, nc]);
      toast("Assinante cadastrado!");
    }
    setModal(null);

    setClients(p => p.filter(c => c.id !== id));

    setClients(p => p.map(c => {

      return { ...upd, status: calcStatus(upd) };

      const ms = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

      if (c.pagamentos.find(x => x.mes === label)) return c;

          { id:"dashboard",   icon:"▦",  label:"Dashboard" },
          { id:"assinantes",  icon:"👥", label:"Assinantes" },
          { id:"cobrancas",   icon:"💳", label:"Cobranças",        badge: inadimp.length + preAlert.length },
          { id:"ordens",      icon:"🔧", label:"Ordens de Serviço",badge: osAtivas.length },
          { id:"equipamentos",icon:"📦", label:"Equipamentos" },
          { id:"mapa",        icon:"🗺",  label:"Mapa de Clientes" },
          { id:"rede",        icon:"📡", label:"Rede / CTO" },
          { id:"relatorios",  icon:"📊", label:"Relatórios" },
          { id:"aniversarios",icon:"🎂", label:"Datas Especiais",  badge: anivs.length },
          { id:"ia",          icon:"✦",  label:"NAIPE IA" },
          { id:"assinatura",  icon:"💎", label:"Minha Assinatura" },
          ...(user.cargo==="Administrador" && (user.role==="provedor"||user.role==="backdoor") ? [{ id:"configuracoes", icon:"⚙️", label:"Configurações" }] : []),
        ].map(item => (
          <button key={item.id} style={{ ...G.navBtn, ...(view === item.id ? G.navOn : {}) }} onClick={() => setView(item.id)}>
            <span style={G.navIcon}>{item.icon}</span>
            <span>{item.label}</span>
            {item.badge > 0 && <span style={G.badge}>{item.badge}</span>}
          </button>
        ))}
        <div style={G.sideBot}>
          <div style={{ background:"#111", border:"1px solid #1f1f1f", borderRadius:10, padding:"12px 14px", marginBottom:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:34, height:34, borderRadius:"50%", background:"#1a0000", color:"#e50914", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:15, flexShrink:0 }}>{user?.avatar}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ color:"#fff", fontSize:13, fontWeight:700, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{user?.nome}</div>
                <div style={{ color:"#555", fontSize:11 }}>{user?.cargo}</div>
              </div>
            </div>
            <button onClick={onLogout} style={{ marginTop:10, width:"100%", background:"#1a0000", border:"1px solid #3a0000", borderRadius:8, padding:"7px", color:"#ef4444", fontSize:11, cursor:"pointer", fontFamily:"Georgia,serif" }}>
              ⏻ Sair
            </button>
          </div>
          <div style={G.aiCard}>
            <div style={{ color:"#a78bfa", fontWeight:700, fontSize:13 }}>✦ NAIPE IA</div>
            <div style={{ color:"#666", fontSize:11, marginTop:2 }}>Assistente ISP Ativa</div>
            <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:8, fontSize:11, color:"#888" }}>
              <span style={{ width:7, height:7, borderRadius:"50%", background:"#22c55e", boxShadow:"0 0 6px #22c55e", display:"inline-block" }} /> Online
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main style={G.main}>
        {notif && (
          <div style={{ ...G.toast, background: notif.type==="err" ? "#7f1d1d" : "#14532d", borderColor: notif.type==="err" ? "#ef4444" : "#22c55e" }}>
            {notif.type==="err" ? "✕" : "✓"} {notif.msg}
          </div>
        )}

        {view === "dashboard"    && <Dashboard clients={clients} inadimp={inadimp} preAlert={preAlert} bloq={bloq} recMensal={recMensal} totAberto={totAberto} ordens={ordens} equips={equips} onNav={setView} onSel={c => { setSel(c); setView("assinantes"); }} />}
        {view === "assinantes"   && <Assinantes clients={filtClients} sel={sel} setSel={setSel} search={search} setSearch={setSearch} fStatus={fStatus} setFStatus={setFStatus} fTipo={fTipo} setFTipo={setFTipo} onNew={() => setModal({ type:"client", data:{} })} onEdit={c => setModal({ type:"client", data:c })} onDel={delClient} onPay={c => setModal({ type:"pay", data:c })} onNota={c => setModal({ type:"nota", data:c })} onConexao={setConexao} onAddPag={addMensalidade} />}
        {view === "cobrancas"    && <Cobrancas inadimp={inadimp} preAlert={preAlert} clients={clients} totAberto={totAberto} onSel={c => { setSel(c); setView("assinantes"); }} onPay={c => setModal({ type:"pay", data:c })} />}
        {view === "ordens"       && <Ordens ordens={ordens} clients={clients} onNew={() => setModal({ type:"os", data:{} })} onEdit={o => setModal({ type:"os", data:o })} onFechar={fecharOS} onMsg={addMsgOS} />}
        {view === "equipamentos" && <Equipamentos equips={equips} clients={clients} onNew={() => setModal({ type:"equip", data:{} })} onEdit={e => setModal({ type:"equip", data:e })} onDel={delEquip} />}
        {view === "mapa"         && <MapaClientes clients={clients} onUpdateLocation={updateLocation} onEdit={c => setModal({ type:"client", data:c })} mapsKey={mapKey} onSaveKey={saveMapsKey} />}
        {view === "rede"         && <Rede clients={clients} onConexao={setConexao} />}
        {view === "relatorios"   && <Relatorios clients={clients} />}
        {view === "aniversarios" && <Aniversarios clients={clients} />}
        {view === "assinatura"   && <MinhaAssinatura assinatura={assinatura} user={user} onUpdate={onUpdateAssinatura} />}
        {view === "configuracoes" && user.cargo==="Administrador" && (user.role==="provedor"||user.role==="backdoor") && <Configuracoes onSaved={() => { window.location.reload(); }} provedorId={user.provedorId} />}
        {view === "ia"           && <IA chat={chat} chatIn={chatIn} setChatIn={setChatIn} loading={chatLoad} onSend={sendChat} chatEnd={chatEnd} clients={clients} recMensal={recMensal} inadimp={inadimp} ordens={ordens} equips={equips} />}
      </main>

      {/* Modals */}
      {modal?.type === "client" && <ModalClient data={modal.data} onSave={saveClient} onClose={() => setModal(null)} />}
      {modal?.type === "pay"    && <ModalPay    client={modal.data} onPay={regPagto} onClose={() => setModal(null)} />}
      {modal?.type === "nota"   && <ModalNota   client={modal.data} onSave={saveNota} onClose={() => setModal(null)} />}
      {modal?.type === "os"     && <ModalOS     data={modal.data} clients={clients} onSave={saveOS} onClose={() => setModal(null)} />}
      {modal?.type === "equip"  && <ModalEquip  data={modal.data} clients={clients} onSave={saveEquip} onClose={() => setModal(null)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({ clients, inadimp, preAlert, bloq, recMensal, totAberto, ordens, equips, onNav, onSel }) {
  const online = clients.filter(c => c.conexao === "online").length;
  const taxaInad = clients.length ? ((inadimp.length / clients.length) * 100).toFixed(1) : 0;
  const osAtivas = ordens.filter(o => o.status === "aberta" || o.status === "em_andamento");
  const emEstoque = equips.filter(e => e.status === "estoque").length;

  return (
    <div style={G.page}>
      <div style={G.pHeader}>
        <div>
          <h1 style={G.pTitle}>Dashboard</h1>
          <p style={G.pSub}>{now().toLocaleDateString("pt-BR", { weekday:"long", year:"numeric", month:"long", day:"numeric" })}</p>
        </div>
        <div style={G.ispTag}>📡 Provedor de Internet</div>
      </div>

      <div style={G.kpiGrid}>
        {[
          { label:"Total Assinantes",   value:clients.length,      icon:"👥", color:"#e50914" },
          { label:"Receita Mensal",     value:fmt(recMensal),       icon:"💰", color:"#22c55e" },
          { label:"Em Aberto",          value:fmt(totAberto),       icon:"⚠️", color:"#f59e0b" },
          { label:"Inadimplentes",      value:inadimp.length,       icon:"🚨", color:"#ef4444" },
          { label:"Taxa Inadimplência", value:`${taxaInad}%`,       icon:"📉", color: Number(taxaInad) > 10 ? "#ef4444" : "#22c55e" },
          { label:"Online",             value:online,               icon:"📡", color:"#22c55e" },
          { label:"Bloqueados",         value:bloq.length,          icon:"🔴", color:"#ef4444" },
          { label:"OS Abertas",         value:osAtivas.length,      icon:"🔧", color:"#60a5fa" },
          { label:"Pré-Alerta",         value:preAlert.length,      icon:"⏰", color:"#f59e0b" },
          { label:"Equip. Estoque",     value:emEstoque,            icon:"📦", color:"#a78bfa" },
        ].map(k => (
          <div key={k.label} style={G.kpiCard}>
            <div style={{ fontSize:22, marginBottom:6 }}>{k.icon}</div>
            <div style={{ fontSize:20, fontWeight:700, color:k.color, marginBottom:4 }}>{k.value}</div>
            <div style={{ color:"#666", fontSize:11 }}>{k.label}</div>
          </div>
        ))}
      </div>

      {osAtivas.length > 0 && (
        <div style={{ ...G.alertBox, borderLeft:"3px solid #60a5fa", marginBottom:16 }}>
          <h2 style={{ ...G.secTitle, color:"#60a5fa" }}>🔧 OS em Aberto</h2>
          {osAtivas.slice(0,3).map(o => (
            <div key={o.id} style={G.alertRow} onClick={() => onNav("ordens")}>
              <div style={{ ...G.av, background:OS_CFG[o.status]?.bg, color:OS_CFG[o.status]?.color, fontSize:12, fontWeight:700 }}>#{String(o.id).slice(-2)}</div>
              <div style={G.alertInfo}><div style={G.alertName}>{o.titulo}</div><div style={G.alertDet}>{o.clienteNome} · {o.tipo} · {o.tecnico}</div></div>
              <div style={{ ...G.sBadge, background:OS_CFG[o.status]?.bg, color:OS_CFG[o.status]?.color }}>{OS_CFG[o.status]?.label}</div>
            </div>
          ))}
        </div>
      )}

      {inadimp.length > 0 && (
        <div style={{ ...G.alertBox, borderLeft:"3px solid #ef4444", marginBottom:16 }}>
          <h2 style={{ ...G.secTitle, color:"#ef4444" }}>🚨 Inadimplentes</h2>
          {inadimp.map(c => (
            <div key={c.id} style={G.alertRow} onClick={() => onSel(c)}>
              <div style={{ ...G.av, background:"#1a0000", color:"#ef4444" }}>{c.nome[0]}</div>
              <div style={G.alertInfo}><div style={G.alertName}>{c.nome}</div><div style={G.alertDet}>{c.plano} · Vence dia {c.vencimento} · {qtdAberto(c)} parcela(s)</div></div>
              <div style={{ color:"#ef4444", fontWeight:700 }}>{fmt(totalAberto(c))}</div>
            </div>
          ))}
        </div>
      )}

      <div style={G.twoCol}>
        <div style={G.card}>
          <h3 style={G.cardTitle}>Distribuição por Status</h3>
          {Object.entries(STATUS_CFG).map(([k, cfg]) => {
            const cnt = clients.filter(c => c.status === k).length;
            const pct = clients.length ? Math.round((cnt/clients.length)*100) : 0;
            return (
              <div key={k} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <div style={{ color:cfg.color, width:130, fontSize:12 }}>{cfg.label}</div>
                <div style={{ flex:1, height:5, background:"#1f1f1f", borderRadius:3 }}><div style={{ height:"100%", width:`${pct}%`, background:cfg.color, borderRadius:3 }} /></div>
                <div style={{ color:"#888", fontSize:12, width:28, textAlign:"right" }}>{cnt}</div>
              </div>
            );
          })}
        </div>
        <div style={G.card}>
          <h3 style={G.cardTitle}>Top Assinantes por Receita</h3>
          {[...clients].sort((a,b) => b.valorMensal - a.valorMensal).slice(0,5).map(c => (
            <div key={c.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <div style={{ width:34, height:34, borderRadius:"50%", background:"#1a0000", color:"#e50914", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:14, flexShrink:0 }}>{c.nome[0]}</div>
              <div style={{ flex:1 }}><div style={{ color:"#fff", fontSize:13, fontWeight:600 }}>{c.nome}</div><div style={{ color:"#666", fontSize:11 }}>{c.plano}</div></div>
              <div style={{ color:"#22c55e", fontWeight:700 }}>{fmt(c.valorMensal)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ASSINANTES
// ═══════════════════════════════════════════════════════════════════════════════
function Assinantes({ clients, sel, setSel, search, setSearch, fStatus, setFStatus, fTipo, setFTipo, onNew, onEdit, onDel, onPay, onNota, onConexao, onAddPag }) {
  return (
    <div style={G.page}>
      <div style={G.pHeader}>
        <div><h1 style={G.pTitle}>Assinantes</h1><p style={G.pSub}>{clients.length} resultado(s)</p></div>
        <button style={G.btnP} onClick={onNew}>+ Novo Assinante</button>
      </div>
      <div style={G.filterBar}>
        <input style={G.searchIn} placeholder="🔍  Nome, CPF, IP, CTO..." value={search} onChange={e => setSearch(e.target.value)} />
        <div style={G.filterBtns}>
          {[{k:"todos",l:"Todos"},{k:"em_dia",l:"Em Dia"},{k:"pre_alerta",l:"Pré-Alerta"},{k:"vencido",l:"Vencido"},{k:"inadimplente",l:"Inadimplente"}].map(f => (
            <button key={f.k} style={{ ...G.fBtn, ...(fStatus===f.k ? G.fBtnOn : {}) }} onClick={() => setFStatus(f.k)}>{f.l}</button>
          ))}
        </div>
        <div style={G.filterBtns}>
          {["todos","Residencial","Empresarial"].map(t => (
            <button key={t} style={{ ...G.fBtn, ...(fTipo===t ? { ...G.fBtnOn, borderColor:"#a78bfa", color:"#a78bfa", background:"#1a0929" } : {}) }} onClick={() => setFTipo(t)}>{t === "todos" ? "Todos tipos" : t}</button>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {clients.map(c => {
          const cfg = STATUS_CFG[c.status];
          const conn = CONN_CFG[c.conexao];
          const open = sel?.id === c.id;
          return (
            <div key={c.id} style={{ ...G.card, cursor:"pointer", border:`2px solid ${open ? "#e50914" : "#1f1f1f"}`, background: open ? "#130000" : "#111", padding:14 }} onClick={() => setSel(open ? null : c)}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ ...G.av, background:cfg.bg, color:cfg.color, fontSize:18 }}>{c.nome[0]}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:"#fff" }}>{c.nome}</div>
                  <div style={{ color:"#666", fontSize:12, marginTop:2 }}>{c.plano} · {c.velocidade} · {c.tipo}</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end" }}>
                  {c.modalidade === "Anual" && <span style={{ padding:"1px 8px", background:"#052e16", color:"#22c55e", border:"1px solid #166534", borderRadius:20, fontSize:10, fontWeight:700 }}>📋 Anual</span>}
                  <div style={{ ...G.sBadge, background:cfg.bg, color:cfg.color }}>{cfg.label}</div>
                  <div style={{ fontSize:11, color:conn.color }}>● {conn.label}</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:14, marginTop:8, fontSize:11, color:"#777", flexWrap:"wrap" }}>
                <span>📅 Dia {c.vencimento}</span>
                <span>💵 {fmt(c.valorMensal)}/mês</span>
                <span>📡 {c.ip}</span>
                <span>🔌 {c.cto}</span>
                {qtdAberto(c) > 0 && <span style={{ color:"#ef4444" }}>⚠️ {qtdAberto(c)} em aberto</span>}
              </div>
              {isAnivNasc(c) && <div style={G.tag}>🎂 Aniversário Hoje!</div>}
              {isAnivContrato(c) && <div style={{ ...G.tag, background:"#1a2000", color:"#84cc16" }}>🏆 {anosFid(c)} ano(s) de contrato!</div>}

              {open && (
                <div style={{ marginTop:14, borderTop:"1px solid #1f1f1f", paddingTop:14 }}>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
                    {[
                      ["📱 Telefone",    c.telefone],
                      ["💬 WhatsApp",    c.whatsapp],
                      ["📧 E-mail",      c.email],
                      ["🪪 CPF/CNPJ",   c.cpfCnpj],
                      ["🏠 Endereço",    c.endereco],
                      ["🌐 IP",          c.ip],
                      ["🔌 MAC",         c.mac],
                      ["📡 CTO/Porta",   `${c.cto} — ${c.porta}`],
                      ["🗺 Localização",  c.lat && c.lng ? `${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}` : "Não cadastrada"],
                      ["📅 Cliente desde",`${fmtDate(c.dataInicio)} (${mesesFid(c)} meses)`],
                      ["💰 Total Pago",  fmt(totalPago(c))],
                      ["📋 Modalidade",  c.modalidade || "Mensal"],
                      ...(c.modalidade === "Anual" ? [["📆 Venc. Contrato", `${fmtDate(vencContrato(c))}${contratoVencido(c) ? " ⚠ Vencido" : contratoVencendo(c) ? " · Renovar" : ""}`]] : []),
                      ...(totalAberto(c) > 0 ? [["🚨 Em Aberto", fmt(totalAberto(c))]] : []),
                    ].map(([l, v]) => (
                      <div key={l} style={{ display:"flex", flexDirection:"column", gap:2 }}>
                        <span style={{ color:"#555", fontSize:11 }}>{l}</span>
                        <span style={{ color: l.includes("Aberto") ? "#ef4444" : l.includes("Pago") ? "#22c55e" : "#ccc", fontSize:13 }}>{v}</span>
                      </div>
                    ))}
                  </div>

                  <div style={{ marginBottom:12 }}>
                    <div style={{ color:"#888", fontSize:11, marginBottom:8 }}>📋 Pagamentos</div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {c.pagamentos.map(p => (
                        <div key={p.mes} title="Clique para gerar fatura" onClick={ev => { ev.stopPropagation(); gerarFatura(c, p); }}
                          style={{ padding:"4px 10px", borderRadius:6, fontSize:11, fontWeight:600, cursor:"pointer", background: p.pago?"#052e16":"#1a0000", color: p.pago?"#22c55e":"#ef4444", border:`1px solid ${p.pago?"#166534":"#7f1d1d"}` }}>
                          {p.mes} {p.pago ? `✓ ${fmtDate(p.dataPag)}` : "⚠ Aberto"} 🖨
                        </div>
                      ))}
                    </div>
                  </div>

                  {c.notas && (
                    <div style={{ background:"#0f0f0f", border:"1px solid #1f1f1f", borderRadius:8, padding:"8px 12px", marginBottom:12 }}>
                      <div style={{ color:"#888", fontSize:11 }}>📝 Notas</div>
                      <div style={{ color:"#ccc", fontSize:13, marginTop:4 }}>{c.notas}</div>
                    </div>
                  )}

                  <div style={{ marginBottom:12 }}>
                    <div style={{ color:"#888", fontSize:12, marginBottom:6 }}>🔧 Conexão</div>
                    <div style={{ display:"flex", gap:6 }}>
                      {Object.entries(CONN_CFG).map(([k, v]) => (
                        <button key={k} onClick={ev => { ev.stopPropagation(); onConexao(c.id, k); }}
                          style={{ padding:"5px 12px", borderRadius:6, border:`1px solid ${c.conexao===k ? v.color : "#333"}`, background: c.conexao===k ? v.color+"22" : "#111", color:v.color, fontSize:11, cursor:"pointer", fontFamily:"Georgia,serif" }}>
                          {v.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <button style={G.btnP} onClick={ev => { ev.stopPropagation(); onPay(c); }}>💳 Pagamento</button>
                    <button style={G.btnS} onClick={ev => { ev.stopPropagation(); onAddPag(c.id); }}>+ Mensalidade</button>
                    <button style={G.btnS} onClick={ev => { ev.stopPropagation(); onNota(c); }}>📝 Notas</button>
                    <button style={G.btnS} onClick={ev => { ev.stopPropagation(); onEdit(c); }}>✏️ Editar</button>
                    <button style={G.btnD} onClick={ev => { ev.stopPropagation(); onDel(c.id); }}>🗑</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {clients.length === 0 && <div style={G.empty}><div style={{ fontSize:48 }}>👥</div><div style={G.emptyT}>Nenhum assinante encontrado</div></div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// COBRANÇAS
// ═══════════════════════════════════════════════════════════════════════════════
function Cobrancas({ inadimp, preAlert, clients, totAberto, onSel, onPay }) {
  const venceHoje = clients.filter(c => c.status === "vencido");
  return (
    <div style={G.page}>
      <div style={G.pHeader}>
        <div><h1 style={G.pTitle}>Central de Cobranças</h1><p style={G.pSub}>Em aberto: <strong style={{ color:"#ef4444" }}>{fmt(totAberto)}</strong></p></div>
      </div>
      {venceHoje.length > 0 && <GrupoCob title="⏰ Vencem Hoje" list={venceHoje} color="#f97316" onSel={onSel} onPay={onPay} />}
      {preAlert.length  > 0 && <GrupoCob title="📢 Vencem em Breve" list={preAlert} color="#f59e0b" onSel={onSel} onPay={onPay} />}
      {inadimp.length   > 0 && <GrupoCob title="🚨 Inadimplentes" list={inadimp} color="#ef4444" onSel={onSel} onPay={onPay} />}
      {venceHoje.length === 0 && preAlert.length === 0 && inadimp.length === 0 && (
        <div style={G.empty}><div style={{ fontSize:48 }}>✅</div><div style={G.emptyT}>Nenhum alerta!</div></div>
      )}
    </div>
  );
}
function GrupoCob({ title, list, color, onSel, onPay }) {
  const total = list.reduce((s,c) => s + totalAberto(c), 0);
  return (
    <div style={{ ...G.alertBox, borderLeft:`3px solid ${color}`, marginBottom:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
        <h2 style={{ ...G.secTitle, color, margin:0 }}>{title}</h2>
        <span style={{ color, fontWeight:700 }}>{fmt(total)}</span>
      </div>
      {list.map(c => (
        <div key={c.id} style={{ ...G.alertRow, cursor:"pointer" }} onClick={() => onSel(c)}>
          <div style={{ ...G.av, background:color+"22", color }}>{c.nome[0]}</div>
          <div style={G.alertInfo}>
            <div style={G.alertName}>{c.nome}</div>
            <div style={G.alertDet}>📱 {c.telefone} · {c.plano} · Dia {c.vencimento}</div>
            <div style={G.alertDet}>{qtdAberto(c)} parcela(s) em aberto</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ color, fontWeight:700, fontSize:18 }}>{fmt(totalAberto(c))}</div>
            <button style={{ ...G.btnP, padding:"5px 12px", fontSize:12, marginTop:6 }} onClick={ev => { ev.stopPropagation(); onPay(c); }}>💳 Pagar</button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ORDENS DE SERVIÇO
// ═══════════════════════════════════════════════════════════════════════════════
function Ordens({ ordens, clients, onNew, onEdit, onFechar, onMsg }) {
  const [filtro, setFiltro] = useState("todos");
  const [search, setSearch] = useState("");
  const [exp, setExp]       = useState(null);
  const [msgIn, setMsgIn]   = useState("");

  const list = ordens
    .filter(o => filtro === "todos" || o.status === filtro)
    .filter(o => !search || o.titulo.toLowerCase().includes(search.toLowerCase()) || o.clienteNome.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={G.page}>
      <div style={G.pHeader}>
        <div><h1 style={G.pTitle}>Ordens de Serviço</h1><p style={G.pSub}>{list.length} OS</p></div>
        <button style={G.btnP} onClick={onNew}>+ Nova OS</button>
      </div>
      <div style={G.kpiGrid}>
        {[{l:"Abertas",color:"#f59e0b",v:ordens.filter(o=>o.status==="aberta").length},{l:"Em Andamento",color:"#60a5fa",v:ordens.filter(o=>o.status==="em_andamento").length},{l:"Concluídas",color:"#22c55e",v:ordens.filter(o=>o.status==="concluida").length},{l:"Total",color:"#e50914",v:ordens.length}].map(k => (
          <div key={k.l} style={G.kpiCard}><div style={{ fontSize:20, fontWeight:700, color:k.color }}>{k.v}</div><div style={{ color:"#666", fontSize:11 }}>{k.l}</div></div>
        ))}
      </div>
      <div style={G.filterBar}>
        <input style={G.searchIn} placeholder="🔍 Título, cliente..." value={search} onChange={e => setSearch(e.target.value)} />
        <div style={G.filterBtns}>
          {[{k:"todos",l:"Todas"},{k:"aberta",l:"Abertas"},{k:"em_andamento",l:"Andamento"},{k:"concluida",l:"Concluídas"},{k:"cancelada",l:"Canceladas"}].map(f => (
            <button key={f.k} style={{ ...G.fBtn, ...(filtro===f.k ? G.fBtnOn : {}) }} onClick={() => setFiltro(f.k)}>{f.l}</button>
          ))}
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {list.map(o => {
          const st = OS_CFG[o.status];
          const isOpen = exp === o.id;
          return (
            <div key={o.id} style={{ ...G.card, cursor:"pointer", border:`2px solid ${isOpen ? st.color : "#1f1f1f"}`, padding:14 }} onClick={() => setExp(isOpen ? null : o.id)}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ ...G.av, background:st.bg, color:st.color, fontSize:12, fontWeight:700 }}>#{String(o.id).slice(-2)}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:"#fff" }}>{o.titulo}</div>
                  <div style={{ color:"#666", fontSize:12, marginTop:2 }}>{o.clienteNome} · {o.tipo} · {o.tecnico}</div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end" }}>
                  <div style={{ ...G.sBadge, background:st.bg, color:st.color }}>{st.label}</div>
                  <div style={{ fontSize:11, color:PRIOR_COLOR[o.prioridade] }}>● {o.prioridade}</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:14, marginTop:8, fontSize:11, color:"#777" }}>
                <span>📅 Criada: {fmtDate(o.dataCriacao)}</span>
                <span>🗓 Agendada: {fmtDate(o.dataAgend)}</span>
                {o.dataFech && <span>✅ {fmtDate(o.dataFech)}</span>}
              </div>
              {isOpen && (
                <div style={{ marginTop:14, borderTop:"1px solid #1f1f1f", paddingTop:14 }}>
                  <div style={{ background:"#0f0f0f", border:"1px solid #1f1f1f", borderRadius:8, padding:"8px 12px", marginBottom:14 }}>
                    <div style={{ color:"#888", fontSize:11, marginBottom:4 }}>📋 Descrição</div>
                    <div style={{ color:"#ccc", fontSize:13 }}>{o.descricao}</div>
                  </div>
                  <div style={{ marginBottom:14 }}>
                    <div style={{ color:"#888", fontSize:11, marginBottom:8 }}>📜 Histórico</div>
                    {o.historico.map((h,i) => (
                      <div key={i} style={{ display:"flex", gap:10, marginBottom:6, paddingBottom:6, borderBottom:"1px solid #151515" }}>
                        <span style={{ color:"#555", fontSize:11, minWidth:80 }}>{h.data}</span>
                        <span style={{ color:"#888", fontSize:11, minWidth:90 }}>{h.autor}</span>
                        <span style={{ color:"#ccc", fontSize:13 }}>{h.msg}</span>
                      </div>
                    ))}
                    {o.status !== "concluida" && o.status !== "cancelada" && (
                      <div style={{ display:"flex", gap:8, marginTop:8 }}>
                        <input style={{ ...G.inp, flex:1, padding:"7px 12px", fontSize:12 }} placeholder="Adicionar atualização..." value={msgIn} onChange={e => setMsgIn(e.target.value)} onClick={e => e.stopPropagation()} />
                        <button style={G.btnS} onClick={e => { e.stopPropagation(); if(msgIn.trim()){ onMsg(o.id, msgIn.trim()); setMsgIn(""); }}}>Enviar</button>
                      </div>
                    )}
                  </div>
                  {o.status !== "concluida" && o.status !== "cancelada" && (
                    <div style={{ display:"flex", gap:8 }}>
                      <button style={G.btnP} onClick={e => { e.stopPropagation(); onFechar(o.id); }}>✅ Concluir</button>
                      <button style={G.btnS} onClick={e => { e.stopPropagation(); onEdit(o); }}>✏️ Editar</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
        {list.length === 0 && <div style={G.empty}><div style={{ fontSize:48 }}>🔧</div><div style={G.emptyT}>Nenhuma OS encontrada</div></div>}
      </div>
    </div>
  );
}

// EQUIPAMENTOS

        <input style={G.searchIn} placeholder="🔍 Marca, modelo, serial, cliente..." value={search} onChange={e => setSearch(e.target.value)} />
        <div style={G.filterBtns}>
          {[{k:"todos",l:"Todos"},{k:"em_uso",l:"Em Uso"},{k:"estoque",l:"Estoque"},{k:"manutencao",l:"Manutenção"},{k:"baixado",l:"Baixado"}].map(f => (
            <button key={f.k} style={{ ...G.fBtn, ...(filtro===f.k ? G.fBtnOn : {}) }} onClick={() => setFiltro(f.k)}>{f.l}</button>

      <div style={G.card}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr>{["Tipo","Marca / Modelo","Serial","Status","Assinante","Atribuído","Valor","Aluguel","Ações"].map(h => <th key={h} style={G.th}>{h}</th>)}</tr>

// MAPA DE CLIENTES
// ═══════════════════════════════════════════════════════════════════════════════
function MapaClientes({ clients, onUpdateLocation, onEdit, mapsKey, onSaveKey }) {
  const mapRef      = useRef(null);
  const mapObj      = useRef(null);
  const markersRef  = useRef({});
  const infoRef     = useRef(null);
  const [loaded, setLoaded]       = useState(false);
  const [apiErr, setApiErr]       = useState(false);
  const [keyInput, setKeyInput]   = useState(mapsKey || "");
  const [filterConn, setFilterConn] = useState("todos");
  const [selClient, setSelClient] = useState(null);
  const [editLatLng, setEditLatLng] = useState(null);
  const [pinMode, setPinMode]     = useState(false);
  const [mapStyle, setMapStyle]   = useState("roadmap");
  const [searchAddr, setSearchAddr] = useState("");
  const [geocoding, setGeocoding] = useState(false);

  const needsKey = !mapsKey || mapsKey === "SUA_CHAVE_GOOGLE_MAPS_AQUI";

  // Load Google Maps script
  useEffect(() => {
    if (needsKey) return;
    if (window.google && window.google.maps) { setLoaded(true); return; }
    const existing = document.getElementById("gmaps-script");
    if (existing) { existing.onload = () => setLoaded(true); return; }
    const script = document.createElement("script");
    script.id = "gmaps-script";
    script.src = `https://maps.googleapis.com/maps/api/js?key=${mapsKey}&libraries=places`;
    script.async = true;
    script.defer = true;
    script.onload = () => setLoaded(true);
    script.onerror = () => setApiErr(true);
    document.head.appendChild(script);
  }, [mapsKey, needsKey]);

  // Init map
  useEffect(() => {
    if (!loaded || !mapRef.current || mapObj.current) return;
    try {
      mapObj.current = new window.google.maps.Map(mapRef.current, {
        center: { lat: -23.5505, lng: -46.6333 },
        zoom: 12,
        mapTypeId: mapStyle,
        styles: [
          { elementType:"geometry", stylers:[{color:"#1a1a2e"}] },
          { elementType:"labels.text.fill", stylers:[{color:"#8ec5fc"}] },
          { elementType:"labels.text.stroke", stylers:[{color:"#1a1a2e"}] },
          { featureType:"road", elementType:"geometry", stylers:[{color:"#2c2c54"}] },
          { featureType:"road", elementType:"geometry.stroke", stylers:[{color:"#212a37"}] },
          { featureType:"water", elementType:"geometry", stylers:[{color:"#0a0a23"}] },
          { featureType:"poi", stylers:[{visibility:"off"}] },
        ],
        disableDefaultUI: false,
        zoomControl: true,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
      });

      infoRef.current = new window.google.maps.InfoWindow();

      // Click on map to place pin (when in pin mode)
      mapObj.current.addListener("click", (e) => {
        if (!pinMode) return;
        const lat = e.latLng.lat();
        const lng = e.latLng.lng();
        setEditLatLng({ lat, lng });
      });

    } catch(err) { setApiErr(true); }
  }, [loaded]);

  // Draw/update markers
  useEffect(() => {
    if (!mapObj.current) return;
    const filtered = clients.filter(c => filterConn === "todos" || c.conexao === filterConn);

    // Remove old markers not in filtered list
    Object.keys(markersRef.current).forEach(id => {
      if (!filtered.find(c => c.id === Number(id))) {
        markersRef.current[id].setMap(null);
        delete markersRef.current[id];
      }
    });

    filtered.forEach(c => {
      if (!c.lat || !c.lng) return;
      const connColor = { online:"#22c55e", offline:"#6b7280", bloqueado:"#ef4444", instavel:"#f59e0b" }[c.conexao] || "#888";

      const icon = {
        path: window.google.maps.SymbolPath.CIRCLE,
        fillColor: connColor,
        fillOpacity: 1,
        strokeColor: "#fff",
        strokeWeight: 2,
        scale: c.status === "inadimplente" ? 10 : 8,
      };

      if (markersRef.current[c.id]) {
        markersRef.current[c.id].setIcon(icon);
        markersRef.current[c.id].setPosition({ lat: c.lat, lng: c.lng });
      } else {
        const marker = new window.google.maps.Marker({
          position: { lat: c.lat, lng: c.lng },
          map: mapObj.current,
          title: c.nome,
          icon,
          animation: window.google.maps.Animation.DROP,
        });

        marker.addListener("click", () => {
          const connLabel = { online:"🟢 Online", offline:"⚫ Offline", bloqueado:"🔴 Bloqueado", instavel:"🟡 Instável" }[c.conexao];
          const stLabel   = { em_dia:"✅ Em Dia", pre_alerta:"⏰ Pré-Alerta", vencido:"⚠️ Vencido", inadimplente:"🚨 Inadimplente" }[c.status];
          infoRef.current.setContent(`
            <div style="font-family:Georgia,serif;padding:4px;min-width:200px">
              <div style="font-weight:700;font-size:15px;margin-bottom:4px">${c.nome}</div>
              <div style="color:#555;font-size:12px;margin-bottom:8px">${c.endereco || ""}</div>
              <div style="font-size:12px;margin-bottom:3px">${connLabel}</div>
              <div style="font-size:12px;margin-bottom:3px">${stLabel}</div>
              <div style="font-size:12px;color:#777;margin-top:6px">${c.plano} · ${c.velocidade}</div>
              <div style="font-size:11px;color:#999">📡 ${c.cto} · IP: ${c.ip}</div>
              <div style="margin-top:10px;display:flex;gap:8px">
                <button onclick="window.__naipeEditClient(${c.id})" style="background:#e50914;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:Georgia,serif">✏️ Editar</button>
                <button onclick="window.__naipePinClient(${c.id})" style="background:#1f1f1f;color:#ccc;border:1px solid #333;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:Georgia,serif">📍 Mover Pin</button>
              </div>
            </div>
          `);
          infoRef.current.open(mapObj.current, marker);
          setSelClient(c);
        });

        markersRef.current[c.id] = marker;
      }
    });
  }, [clients, filterConn, loaded]);

  // Global handlers for InfoWindow buttons
  useEffect(() => {
    window.__naipeEditClient = (id) => {
      const c = clients.find(x => x.id === id);
      if (c) onEdit(c);
      infoRef.current?.close();
    };
    window.__naipePinClient = (id) => {
      const c = clients.find(x => x.id === id);
      if (c) { setSelClient(c); setPinMode(true); infoRef.current?.close(); }
    };
    return () => { delete window.__naipeEditClient; delete window.__naipePinClient; };
  }, [clients]);

  // Geocode address and center map
  async function geocodeAddress() {
    if (!searchAddr.trim() || !window.google) return;
    setGeocoding(true);
    const geocoder = new window.google.maps.Geocoder();
    geocoder.geocode({ address: searchAddr }, (results, status) => {
      setGeocoding(false);
      if (status === "OK" && results[0]) {
        const loc = results[0].geometry.location;
        mapObj.current.setCenter(loc);
        mapObj.current.setZoom(16);
      } else {
        alert("Endereço não encontrado.");
      }
    });
  }

  // Geocode client address
  async function geocodeClient(c) {
    if (!window.google || !c.endereco) return;
    const addr = `${c.endereco}, ${c.cidade || ""}`;
    const geocoder = new window.google.maps.Geocoder();
    geocoder.geocode({ address: addr }, (results, status) => {
      if (status === "OK" && results[0]) {
        const loc = results[0].geometry.location;
        const lat = loc.lat(); const lng = loc.lng();
        onUpdateLocation(c.id, lat, lng);
        mapObj.current.setCenter({ lat, lng });
        mapObj.current.setZoom(16);
      } else {
        alert("Não foi possível geocodificar o endereço deste cliente.");
      }
    });
  }

  // Confirm pin placement
  function confirmPin() {
    if (!editLatLng || !selClient) return;
    onUpdateLocation(selClient.id, editLatLng.lat, editLatLng.lng);
    setPinMode(false);
    setEditLatLng(null);
    setSelClient(null);
  }

  const comLoc    = clients.filter(c => c.lat && c.lng);
  const semLoc    = clients.filter(c => !c.lat || !c.lng);
  const filtComLoc = comLoc.filter(c => filterConn === "todos" || c.conexao === filterConn);

  // ── Config screen if no key ───────────────────────────────────────────────
  if (needsKey) {
    return (
      <div style={G.page}>
        <div style={G.pHeader}><div><h1 style={G.pTitle}>🗺 Mapa de Clientes</h1><p style={G.pSub}>Configure sua chave Google Maps</p></div></div>
        <div style={{ maxWidth:520, margin:"0 auto" }}>
          <div style={{ ...G.card, marginBottom:20 }}>
            <div style={{ fontSize:48, textAlign:"center", marginBottom:16 }}>🗺</div>
            <h3 style={{ ...G.cardTitle, textAlign:"center", fontSize:18 }}>Configure o Google Maps</h3>
            <p style={{ color:"#666", fontSize:13, textAlign:"center", marginBottom:24, lineHeight:1.6 }}>Para usar o mapa, você precisa de uma chave da API do Google Maps.</p>
            <div style={{ background:"#0a0a0a", border:"1px solid #2a2a2a", borderRadius:10, padding:16, marginBottom:20 }}>
              <div style={{ color:"#f59e0b", fontSize:12, fontWeight:700, marginBottom:8 }}>📋 Como obter sua chave (grátis):</div>
              <div style={{ color:"#aaa", fontSize:12, lineHeight:1.8 }}>
                1. Acesse <span style={{ color:"#60a5fa" }}>console.cloud.google.com</span><br/>
                2. Crie um projeto (ou selecione um existente)<br/>
                3. Ative a <strong style={{ color:"#fff" }}>Maps JavaScript API</strong><br/>
                4. Vá em Credenciais → Criar Credencial → Chave de API<br/>
                5. Cole a chave abaixo e salve
              </div>
            </div>
            <div style={G.fField}>
              <label style={G.fLabel}>SUA CHAVE DA API GOOGLE MAPS</label>
              <input style={{ ...G.inp, fontFamily:"monospace", fontSize:12 }} value={keyInput} onChange={e => setKeyInput(e.target.value)} placeholder="AIzaSy..." />
            </div>
            <button style={{ ...G.btnP, width:"100%", padding:14, fontSize:14, marginTop:8 }} onClick={() => { if(keyInput.trim()) onSaveKey(keyInput.trim()); }}>
              Salvar e Ativar Mapa
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (apiErr) {
    return (
      <div style={G.page}>
        <div style={{ textAlign:"center", padding:60 }}>
          <div style={{ fontSize:48, marginBottom:16 }}>❌</div>
          <h2 style={{ color:"#ef4444", marginBottom:8 }}>Erro ao carregar o Google Maps</h2>
          <p style={{ color:"#666", marginBottom:20 }}>Verifique se sua chave de API é válida e se a Maps JavaScript API está ativada.</p>
          <button style={G.btnP} onClick={() => { setApiErr(false); onSaveKey(""); }}>Reconfigurar chave</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 0px)", padding:0 }}>
      {/* Header */}
      <div style={{ padding:"16px 28px 12px", borderBottom:"1px solid #1f1f1f", background:"#0a0a0a", flexShrink:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <div>
            <h1 style={G.pTitle}>🗺 Mapa de Clientes</h1>
            <p style={G.pSub}>{filtComLoc.length} de {clients.length} clientes posicionados</p>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            {pinMode && (
              <div style={{ background:"#2d1a00", border:"1px solid #f59e0b", borderRadius:8, padding:"8px 14px", color:"#f59e0b", fontSize:12 }}>
                📍 Clique no mapa para posicionar: <strong>{selClient?.nome}</strong>
              </div>
            )}
            {editLatLng && pinMode && (
              <>
                <button style={G.btnP} onClick={confirmPin}>✅ Confirmar posição</button>
                <button style={G.btnS} onClick={() => { setPinMode(false); setEditLatLng(null); }}>Cancelar</button>
              </>
            )}
            <button style={{ ...G.btnS, fontSize:11 }} onClick={() => { onSaveKey(""); }}>⚙ Trocar chave</button>
          </div>
        </div>

// RELATÓRIOS
// ═══════════════════════════════════════════════════════════════════════════════
function Relatorios({ clients }) {
  const recMensal  = clients.reduce((s,c) => s + c.valorMensal, 0);
  const recHist    = clients.reduce((s,c) => s + totalPago(c), 0);
  const totAberto2 = clients.reduce((s,c) => s + totalAberto(c), 0);
  const ticket     = clients.length ? recMensal / clients.length : 0;
  const anuais     = clients.filter(c => c.modalidade === "Anual");
  const mensais    = clients.filter(c => c.modalidade !== "Anual");

  const porPlano = PLANOS.map(p => ({
    ...p,
    cnt: clients.filter(c => c.plano === p.nome).length,
    rec: clients.filter(c => c.plano === p.nome).reduce((s,c) => s + c.valorMensal, 0),
  })).filter(p => p.cnt > 0);

  return (
    <div style={G.page}>
      <div style={G.pHeader}><div><h1 style={G.pTitle}>Relatórios Financeiros</h1><p style={G.pSub}>Visão consolidada</p></div></div>
      <div style={G.kpiGrid}>
        {[
          {l:"Receita Mensal",    v:fmt(recMensal),  icon:"📈", color:"#22c55e"},
          {l:"Histórico Recebido",v:fmt(recHist),    icon:"✅", color:"#22c55e"},
          {l:"Em Aberto",         v:fmt(totAberto2), icon:"⚠️", color:"#f59e0b"},
          {l:"Ticket Médio",      v:fmt(ticket),     icon:"💵", color:"#e50914"},
          {l:"Residenciais",      v:clients.filter(c=>c.tipo==="Residencial").length, icon:"🏠", color:"#60a5fa"},
          {l:"Empresariais",      v:clients.filter(c=>c.tipo==="Empresarial").length, icon:"🏢", color:"#a78bfa"},
          {l:"Contratos Anuais",  v:anuais.length,   icon:"📋", color:"#22c55e"},
          {l:"Contratos Mensais", v:mensais.length,  icon:"🗓", color:"#888"},
        ].map(k => (
          <div key={k.l} style={G.kpiCard}>
            <div style={{ fontSize:20 }}>{k.icon}</div>
            <div style={{ fontSize:18, fontWeight:700, color:k.color, marginBottom:2 }}>{k.v}</div>
            <div style={{ color:"#666", fontSize:11 }}>{k.l}</div>
          </div>
        ))}
      </div>
      <div style={{ ...G.card, marginBottom:16 }}>
        <h3 style={G.cardTitle}>📊 Receita por Plano</h3>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr>{["Plano","Velocidade","Valor","Assinantes","Receita Mensal","% Total"].map(h => <th key={h} style={G.th}>{h}</th>)}</tr></thead>
            <tbody>
              {porPlano.sort((a,b)=>b.rec-a.rec).map(p => (
                <tr key={p.nome} style={{ borderBottom:"1px solid #151515" }}>
                  <td style={G.td}>{p.nome}</td>
                  <td style={G.td}>{p.velocidade}</td>
                  <td style={G.td}>{fmt(p.valor)}</td>
                  <td style={G.td}>{p.cnt}</td>
                  <td style={{ ...G.td, color:"#22c55e", fontWeight:700 }}>{fmt(p.rec)}</td>
                  <td style={G.td}>{recMensal ? ((p.rec/recMensal)*100).toFixed(1) : 0}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      <div style={G.card}>
        <h3 style={G.cardTitle}>📋 Situação dos Assinantes</h3>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr>{["Nome","Plano","Mensalidade","Status","Conexão","Pago","Em Aberto","Fidelidade","Modalidade"].map(h => <th key={h} style={G.th}>{h}</th>)}</tr></thead>
            <tbody>
              {clients.map(c => (
                <tr key={c.id} style={{ borderBottom:"1px solid #151515" }}>
                  <td style={G.td}>{c.nome}</td>
                  <td style={G.td}>{c.plano}</td>
                  <td style={G.td}>{fmt(c.valorMensal)}</td>
                  <td style={{ ...G.td, color:STATUS_CFG[c.status]?.color }}>{STATUS_CFG[c.status]?.label}</td>
                  <td style={{ ...G.td, color:CONN_CFG[c.conexao]?.color }}>{CONN_CFG[c.conexao]?.label}</td>
                  <td style={{ ...G.td, color:"#22c55e" }}>{fmt(totalPago(c))}</td>
                  <td style={{ ...G.td, color:totalAberto(c)>0?"#ef4444":"#666" }}>{fmt(totalAberto(c))}</td>
                  <td style={G.td}>{mesesFid(c)} meses</td>
                  <td style={{ ...G.td, color:c.modalidade==="Anual"?"#22c55e":"#888" }}>{c.modalidade||"Mensal"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ANIVERSÁRIOS
// ═══════════════════════════════════════════════════════════════════════════════
function Aniversarios({ clients }) {
  const nasc     = clients.filter(c => isAnivNasc(c));
  const contrato = clients.filter(c => isAnivContrato(c));
  const proximos = clients.map(c => {
    if (!c.dataNascimento) return null;
    const [,m,d] = c.dataNascimento.split("-").map(Number);
    const next = new Date(nowYear(), m-1, d);
    if (next <= now()) next.setFullYear(nowYear()+1);
    return { ...c, dias: Math.ceil((next - now()) / (1000*60*60*24)) };
  }).filter(c => c && c.dias > 0 && c.dias <= 30).sort((a,b) => a.dias - b.dias);

  return (
    <div style={G.page}>
      <div style={G.pHeader}><div><h1 style={G.pTitle}>Datas Especiais</h1><p style={G.pSub}>Aniversários e fidelidade</p></div></div>
      {nasc.length > 0 && (
        <div style={{ ...G.alertBox, borderLeft:"3px solid #a78bfa", marginBottom:16 }}>
          <h2 style={{ ...G.secTitle, color:"#a78bfa" }}>🎂 Aniversariantes Hoje!</h2>
          {nasc.map(c => (
            <div key={c.id} style={{ ...G.alertRow }}>
              <div style={{ fontSize:28 }}>🎂</div>
              <div style={{ flex:1 }}>
                <div style={G.alertName}>{c.nome}</div>
                <div style={G.alertDet}>📱 {c.telefone} · {c.plano}</div>
                <div style={{ background:"#0f0f0f", border:"1px solid #1f1f1f", borderRadius:8, padding:"8px 12px", marginTop:8, fontSize:13, color:"#ccc" }}>
                  Parabéns, {c.nome.split(" ")[0]}! 🎉 A equipe NAIPE deseja um feliz aniversário!
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {contrato.length > 0 && (
        <div style={{ ...G.alertBox, borderLeft:"3px solid #84cc16", marginBottom:16 }}>
          <h2 style={{ ...G.secTitle, color:"#84cc16" }}>🏆 Aniversário de Contrato!</h2>
          {contrato.map(c => (
            <div key={c.id} style={G.alertRow}>
              <div style={{ fontSize:28 }}>🏆</div>
              <div style={{ flex:1 }}>
                <div style={G.alertName}>{c.nome} — {anosFid(c)} ano(s)!</div>
                <div style={G.alertDet}>{c.telefone} · {c.plano} · desde {fmtDate(c.dataInicio)}</div>
                <div style={{ background:"#0f0f0f", border:"1px solid #1f1f1f", borderRadius:8, padding:"8px 12px", marginTop:8, fontSize:13, color:"#ccc" }}>
                  Obrigado pela fidelidade, {c.nome.split(" ")[0]}! 🏆 São {anosFid(c)} ano(s) com a NAIPE!
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {proximos.length > 0 && (
        <div style={G.alertBox}>
          <h2 style={G.secTitle}>📅 Próximos 30 dias</h2>
          {proximos.map(c => (
            <div key={c.id} style={G.alertRow}>
              <div style={{ ...G.av, background:"#1a0929", color:"#a78bfa" }}>{c.nome[0]}</div>
              <div style={G.alertInfo}><div style={G.alertName}>{c.nome}</div><div style={G.alertDet}>🎂 {fmtDate(c.dataNascimento)} · {c.telefone}</div></div>
              <div style={{ color:"#a78bfa", fontWeight:700 }}>em {c.dias} dia(s)</div>
            </div>
          ))}
        </div>
      )}
      {nasc.length===0 && contrato.length===0 && proximos.length===0 && (
        <div style={G.empty}><div style={{ fontSize:48 }}>📅</div><div style={G.emptyT}>Sem datas nos próximos 30 dias</div></div>
      )}
    </div>
  );
}

function ModalClient({ data, onSave, onClose }) {
  const isNew = !data.id;
  const p0 = PLANOS[0];

  const s = (k,v) => setF(p => ({ ...p, [k]:v }));

  function onPlanoChange(nome) {
    const p = PLANOS.find(x => x.nome === nome);
    if (!p) return;
    const val = f.modalidade === "Anual" ? +(p.valor * (1 - DESCONTO_ANUAL)).toFixed(2) : p.valor;
    setF(prev => ({ ...prev, plano:p.nome, velocidade:p.velocidade, valorMensal:val, _valorBase:p.valor }));
  }
  function onModalidade(mod) {
    const base = PLANOS.find(x=>x.nome===f.plano)?.valor || f._valorBase || f.valorMensal;
    const val = mod === "Anual" ? +(base * (1-DESCONTO_ANUAL)).toFixed(2) : base;
    setF(p => ({ ...p, modalidade:mod, valorMensal:val, _valorBase:base }));
  }

  const base = PLANOS.find(x=>x.nome===f.plano)?.valor || f._valorBase || f.valorMensal;

  return (
    <div style={G.overlay}>
      <div style={{ ...G.modal, maxWidth:680 }}>

              <div key={x.k} style={G.fField}><label style={G.fLabel}>{x.l}</label><input style={G.inp} type={x.t||"text"} value={f[x.k]||""} onChange={e => s(x.k, e.target.value)} /></div>
            ))}
          </div>
          <div style={G.mSec}>📡 Plano e Contrato</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
            <div style={G.fField}><label style={G.fLabel}>Plano</label>
              <select style={G.inp} value={f.plano} onChange={e => onPlanoChange(e.target.value)}>
                {PLANOS.map(p => <option key={p.nome} value={p.nome}>{p.nome} — {fmt(p.valor)}</option>)}
              </select>
            </div>
            <div style={G.fField}><label style={G.fLabel}>Tipo</label>
              <select style={G.inp} value={f.tipo} onChange={e => s("tipo",e.target.value)}>
                <option>Residencial</option><option>Empresarial</option>
              </select>
            </div>
            <div style={G.fField}><label style={G.fLabel}>Modalidade</label>
              <select style={G.inp} value={f.modalidade} onChange={e => onModalidade(e.target.value)}>
                <option value="Mensal">Mensal</option>
                <option value="Anual">Anual (10% desconto)</option>
              </select>
            </div>
            <div style={G.fField}><label style={G.fLabel}>Valor Mensal</label><input style={G.inp} type="number" value={f.valorMensal} onChange={e => s("valorMensal",Number(e.target.value))} /></div>
            <div style={G.fField}><label style={G.fLabel}>Vencimento (dia)</label><input style={G.inp} type="number" min={1} max={28} value={f.vencimento} onChange={e => s("vencimento",Number(e.target.value))} /></div>
            <div style={G.fField}><label style={G.fLabel}>Cliente desde</label><input style={G.inp} type="date" value={f.dataInicio} onChange={e => s("dataInicio",e.target.value)} /></div>

              <select style={G.inp} value={f.conexao} onChange={e => s("conexao",e.target.value)}>
                {Object.entries(CONN_CFG).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </div>
          {f.modalidade === "Anual" && (
            <div style={{ background:"#071a0e", border:"1px solid #166534", borderRadius:10, padding:"12px 16px", marginBottom:12 }}>
              <div style={{ color:"#22c55e", fontSize:12, fontWeight:700, marginBottom:8 }}>📋 Resumo Contrato Anual</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {[["Valor sem desconto",<span style={{color:"#888",textDecoration:"line-through"}}>{fmt(base)}/mês</span>],["Com 10% desconto",<span style={{color:"#22c55e",fontWeight:700}}>{fmt(+(base*(1-DESCONTO_ANUAL)).toFixed(2))}/mês</span>],["Total anual",<span style={{color:"#fff",fontWeight:700}}>{fmt(+(base*(1-DESCONTO_ANUAL)).toFixed(2)*12)}</span>],["Economia",<span style={{color:"#22c55e",fontWeight:700}}>💰 {fmt(+(base*DESCONTO_ANUAL*12).toFixed(2))}</span>]].map(([l,v]) => (
                  <div key={l} style={{ display:"flex", flexDirection:"column", gap:2 }}><span style={{ color:"#666", fontSize:11 }}>{l}</span>{v}</div>
                ))}
              </div>
            </div>
          )}
          <div style={G.mSec}>🔌 Rede</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            {[{k:"ip",l:"IP"},{k:"mac",l:"MAC"},{k:"cto",l:"CTO"},{k:"porta",l:"Porta"}].map(x => (
              <div key={x.k} style={G.fField}><label style={G.fLabel}>{x.l}</label><input style={{ ...G.inp, fontFamily:"monospace" }} value={f[x.k]||""} onChange={e => s(x.k,e.target.value)} /></div>
            ))}
          </div>
          <div style={G.mSec}>🗺 Localização no Mapa</div>
          <div style={{ background:"#071018", border:"1px solid #0d2a3e", borderRadius:10, padding:"12px 16px", marginBottom:12 }}>
            <div style={{ color:"#60a5fa", fontSize:12, marginBottom:10 }}>Coordenadas GPS para exibir no mapa de clientes.</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              <div style={G.fField}><label style={G.fLabel}>LATITUDE</label><input style={{ ...G.inp, fontFamily:"monospace" }} type="number" step="0.00001" value={f.lat||""} onChange={e => s("lat", e.target.value ? Number(e.target.value) : null)} placeholder="-23.55052" /></div>
              <div style={G.fField}><label style={G.fLabel}>LONGITUDE</label><input style={{ ...G.inp, fontFamily:"monospace" }} type="number" step="0.00001" value={f.lng||""} onChange={e => s("lng", e.target.value ? Number(e.target.value) : null)} placeholder="-46.63330" /></div>
            </div>
            <div style={{ color:"#555", fontSize:11, marginTop:6 }}>💡 Você pode definir a posição diretamente no módulo Mapa (📍 Auto ou ✋ Manual)</div>
          </div>
        </div>
        <div style={G.mFoot}>
          <button style={G.btnS} onClick={onClose}>Cancelar</button>
          <button style={G.btnP} onClick={() => { if(!f.nome||!f.telefone){alert("Preencha nome e telefone.");return;} onSave(f); }}>{isNew ? "Cadastrar" : "Salvar"}</button>
        </div>
      </div>
    </div>
  );
}

function ModalEquip({ data, clients, onSave, onClose }) {

  return (

            <div style={G.fField}><label style={G.fLabel}>Valor (R$)</label><input style={G.inp} type="number" value={f.valor} onChange={e=>s("valor",Number(e.target.value))} /></div>
            <div style={G.fField}><label style={G.fLabel}>Assinante</label><select style={G.inp} value={f.clienteId||""} onChange={e=>onCli(e.target.value)}><option value="">— Sem assinante —</option>{clients.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</select></div>
            <div style={G.fField}><label style={G.fLabel}>Data Atribuição</label><input style={G.inp} type="date" value={f.dataAtrib||""} onChange={e=>s("dataAtrib",e.target.value)} /></div>
            <div style={{ ...G.fField, gridColumn:"1/-1" }}>

        <div style={G.mFoot}><button style={G.btnS} onClick={onClose}>Cancelar</button><button style={G.btnP} onClick={()=>{ if(!f.marca||!f.modelo){alert("Preencha marca e modelo.");return;} onSave(f); }}>{isNew?"Cadastrar":"Salvar"}</button></div>

  );
}

function ModalProvedor({ data, onSave, onClose }) {
  const isNew = !data.id;
  const [f, setF] = React.useState({ nome:"", email:"", senha:"", telefone:"", cnpj:"", cidade:"", ...data });
  const s = (k,v) => setF(p=>({...p,[k]:v}));

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20 }}>
      <div style={{ background:"#111",border:"1px solid #2a2a2a",borderRadius:16,padding:28,width:"100%",maxWidth:480 }}>

          <h2 style={{ color:"#fff",fontSize:18,fontWeight:700,margin:0 }}>{isNew?"Novo Provedor":"Editar Provedor"}</h2>

        </div>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
          {[
            {k:"nome",l:"Nome / Empresa",p:"Provedor XYZ"},
            {k:"email",l:"E-mail de Login",p:"admin@provedor.com"},
            {k:"senha",l:"Senha",p:"••••••••",t:"password"},
            {k:"telefone",l:"Telefone",p:"(11) 99999-0000"},
            {k:"cnpj",l:"CNPJ",p:"00.000.000/0001-00"},
            {k:"cidade",l:"Cidade",p:"São Paulo - SP"},
          ].map(x=>(
            <div key={x.k} style={{ display:"flex",flexDirection:"column",gap:4 }}>
              <label style={{ color:"#888",fontSize:11 }}>{x.l.toUpperCase()}</label>
              <input type={x.t||"text"} style={{ background:"#0a0a0a",border:"1px solid #2a2a2a",borderRadius:8,padding:"9px 12px",color:"#e5e5e5",fontSize:13,outline:"none",fontFamily:"Georgia,serif" }}
                placeholder={x.p} value={f[x.k]||""} onChange={e=>s(x.k,e.target.value)} />
            </div>
          ))}
        </div>
        {!isNew && (
          <div style={{ background:"#071018",border:"1px solid #0d2a3e",borderRadius:8,padding:"10px 14px",marginTop:12,color:"#60a5fa",fontSize:12 }}>
            💡 Deixe a senha em branco para manter a atual.
          </div>
        )}
        <div style={{ display:"flex",gap:10,marginTop:20,justifyContent:"flex-end" }}>
          <button onClick={onClose} style={{ background:"#1f1f1f",color:"#ccc",border:"1px solid #333",borderRadius:8,padding:"9px 18px",fontSize:13,cursor:"pointer",fontFamily:"Georgia,serif" }}>Cancelar</button>
          <button onClick={()=>{ if(!f.nome||!f.email||(isNew&&!f.senha)){alert("Preencha nome, e-mail e senha.");return;} const d={...f}; if(!d.senha&&!isNew)delete d.senha; onSave(d); }}
            style={{ background:"#e50914",color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Georgia,serif" }}>
            {isNew?"Criar Provedor":"Salvar"}
          </button>
        </div>
      </div>
    </div>
  );
}

                {ciclo === "anual" && (

                    {fmtMoney(p.preco_mensal)}/mês
                  </div>
                )}
                <div style={{ display:"flex", alignItems:"baseline", gap:4 }}>
                  <span style={{ color:"#fff", fontSize:36, fontWeight:900 }}>{fmtMoney(precoMes)}</span>
                  <span style={{ color:"#666", fontSize:13 }}>/mês</span>
                </div>
                {ciclo === "anual" && (
                  <div style={{ color:"#22c55e", fontSize:12, marginTop:4 }}>💰 Economia de {fmtMoney(p.economia_anual)}/ano</div>
                )}
                {ciclo === "anual" && (
                  <div style={{ color:"#888", fontSize:11, marginTop:2 }}>Cobrado {fmtMoney(preco)} por ano</div>
                )}
              </div>

              <div style={{ marginBottom:24 }}>
                {p.recursos.map(r => (
                  <div key={r} style={{ display:"flex", gap:8, marginBottom:7, fontSize:13 }}>
                    <span style={{ color:p.cor, flexShrink:0 }}>✓</span>
                    <span style={{ color:"#ccc" }}>{r}</span>
                  </div>
                ))}
                {p.nao_inclui.map(r => (
                  <div key={r} style={{ display:"flex", gap:8, marginBottom:7, fontSize:13 }}>
                    <span style={{ color:"#333", flexShrink:0 }}>✕</span>
                    <span style={{ color:"#444" }}>{r}</span>
                  </div>
                ))}
              </div>

              <button
                onClick={() => onSelect(p.id, ciclo)}
                style={{ width:"100%", background: isAtual ? "#1f1f1f" : p.destaque ? p.cor : "#1f1f1f", color: isAtual ? "#666" : p.destaque ? "#fff" : p.cor, border:`2px solid ${isAtual ? "#2a2a2a" : p.cor}`, borderRadius:10, padding:"13px", fontSize:14, fontWeight:700, cursor: isAtual ? "default" : "pointer", fontFamily:"Georgia,serif" }}
                disabled={isAtual}
              >
                {isAtual ? "Plano Atual" : `Assinar ${p.nome} →`}
              </button>
            </div>
          );
        })}
      </div>

      <div style={{ textAlign:"center" }}>
        <button onClick={onVoltar} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:13, fontFamily:"Georgia,serif" }}>← Voltar ao login</button>
      </div>
    </div>
  );
}

// TELA DE CHECKOUT

function TelaCheckout({ user, onConfirmar, onVoltar }) {

  const [forma, setForma]         = React.useState("pix");

  const [cartao, setCartao]       = React.useState({ numero:"", nome:"", validade:"", cvv:"", parcelas:"1" });
  const [boleto, setBoleto]       = React.useState({ cpfCnpj:"", nome:"" });
  const [pix, setPix]             = React.useState(false);
  const [loading, setLoading]     = React.useState(false);

  const FORMAS = [

    { id:"boleto", icon:"📄", label:"Boleto Bancário",  sub:"Vence em 3 dias úteis" },

  function confirmar() {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (forma === "pix") { setPix(true); return; }
      onConfirmar({ forma, cartao: forma==="cartao" ? cartao : null, boleto: forma==="boleto" ? boleto : null });

  }

  function fmtCartao(v) { return v.replace(/\D/g,"").slice(0,16).replace(/(.{4})/g,"$1 ").trim(); }

  if (!plano) return null;

  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0a", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"40px 20px", overflowY:"auto" }}>

            </div>
            <div style={{ color:"#fff", fontWeight:700, fontSize:18, letterSpacing:3 }}>NAIPE FINANCEIRO</div>

        </div>

          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:24 }}>{plano.emoji}</span>
                <span style={{ color:"#fff", fontWeight:900, fontSize:18 }}>Plano {plano.nome}</span>
                <span style={{ background:plano.bg, color:plano.cor, border:`1px solid ${plano.cor}44`, padding:"2px 10px", borderRadius:20, fontSize:11, fontWeight:700 }}>{ciclo === "anual" ? "ANUAL" : "MENSAL"}</span>
              </div>
              <div style={{ color:"#666", fontSize:13, marginTop:4 }}>{plano.desc}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ color:plano.cor, fontWeight:900, fontSize:24 }}>{fmtMoney(valor)}</div>
              <div style={{ color:"#666", fontSize:11 }}>{ciclo === "anual" ? "por ano" : "por mês"}</div>
            </div>
          </div>
          {ciclo === "anual" && (
            <div style={{ marginTop:12, background:"#052e16", border:"1px solid #166534", borderRadius:8, padding:"8px 12px", color:"#22c55e", fontSize:12 }}>

          )}
        </div>

        {/* PIX confirmed */}
        {pix && (
          <div style={{ background:"#111", border:"1px solid #1f1f1f", borderRadius:16, padding:28, textAlign:"center" }}>
            <div style={{ fontSize:48, marginBottom:16 }}>⚡</div>

                  </div>
                  <span style={{ fontSize:22 }}>{f.icon}</span>

              ))}

            {/* Cartão form */}
            {forma === "cartao" && (
              <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:20 }}>
                <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                  <label style={{ color:"#888", fontSize:11 }}>NÚMERO DO CARTÃO</label>
                  <input style={{ background:"#0a0a0a", border:"1px solid #2a2a2a", borderRadius:8, padding:"11px 14px", color:"#e5e5e5", fontSize:15, outline:"none", fontFamily:"monospace", letterSpacing:2 }}
                    placeholder="0000 0000 0000 0000" maxLength={19}
                    value={cartao.numero} onChange={e => setCartao(p=>({...p,numero:fmtCartao(e.target.value)}))} />
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                  <label style={{ color:"#888", fontSize:11 }}>NOME NO CARTÃO</label>
                  <input style={{ background:"#0a0a0a", border:"1px solid #2a2a2a", borderRadius:8, padding:"11px 14px", color:"#e5e5e5", fontSize:14, outline:"none", fontFamily:"Georgia,serif" }}

// CONFIGURAÇÕES — painel completo editável pelo administrador
// ═══════════════════════════════════════════════════════════════════════════════
function Configuracoes({ onSaved }) {
  const [cfg, setCfg]     = React.useState(() => getCfg());
  const [aba, setAba]     = React.useState("empresa");
  const [toast, setToast] = React.useState(null);
  const [confirm, setConfirm] = React.useState(null);

  function showMsg(msg, type="ok") { setToast({msg,type}); setTimeout(()=>setToast(null),3500); }

  function set(section, key, val) {
    setCfg(p => ({ ...p, [section]: { ...p[section], [key]: val } }));
  }
  function setRoot(key, val) {
    setCfg(p => ({ ...p, [key]: val }));
  }

  function salvar() {
    saveCfg(cfg);
    showMsg("✅ Configurações salvas! A página será recarregada.");
    setTimeout(() => onSaved(), 1500);
  }

  function resetar() {
    saveCfg(CFG_DEFAULT);
    showMsg("Configurações restauradas ao padrão.");
    setTimeout(() => onSaved(), 1500);
  }

  // ── Planos ISP helpers ─────────────────────────────────────────────────────
  function addPlanoISP() {
    const novo = { nome:"Novo Plano", velocidade:"100 Mbps", valor:99.90 };
    setRoot("planos_isp", [...(cfg.planos_isp||[]), novo]);
  }
  function updatePlanoISP(i, key, val) {
    const arr = [...(cfg.planos_isp||[])];
    arr[i] = { ...arr[i], [key]: key==="valor" ? Number(val) : val };
    setRoot("planos_isp", arr);
  }
  function removePlanoISP(i) {
    setRoot("planos_isp", (cfg.planos_isp||[]).filter((_,idx)=>idx!==i));
  }

  // ── Planos sistema helpers ─────────────────────────────────────────────────
  function updatePlanoSistema(i, key, val) {
    const arr = [...(cfg.planos_sistema||[])];
    arr[i] = { ...arr[i], [key]: ["preco_mensal","preco_anual","economia_anual","limite_clientes"].includes(key) ? Number(val) : val };
    setRoot("planos_sistema", arr);
  }
  function updateRecursoSistema(planoIdx, recIdx, val) {
    const arr = [...(cfg.planos_sistema||[])];
    const recursos = [...arr[planoIdx].recursos];
    recursos[recIdx] = val;
    arr[planoIdx] = { ...arr[planoIdx], recursos };
    setRoot("planos_sistema", arr);
  }
  function addRecursoSistema(planoIdx) {
    const arr = [...(cfg.planos_sistema||[])];
    arr[planoIdx] = { ...arr[planoIdx], recursos: [...arr[planoIdx].recursos, "Novo recurso"] };
    setRoot("planos_sistema", arr);
  }
  function removeRecursoSistema(planoIdx, recIdx) {
    const arr = [...(cfg.planos_sistema||[])];
    arr[planoIdx] = { ...arr[planoIdx], recursos: arr[planoIdx].recursos.filter((_,i)=>i!==recIdx) };
    setRoot("planos_sistema", arr);
