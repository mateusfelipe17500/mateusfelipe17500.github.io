  <script>
    function showFatalError(icon, title, msg) {
      var r = document.getElementById('root');
      if (r) r.innerHTML =
        '<div style="min-height:100vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;font-family:Georgia,serif;text-align:center">' +
        '<div style="font-size:52px;margin-bottom:16px">' + icon + '</div>' +
        '<h2 style="color:#e50914;font-size:20px;margin-bottom:12px">' + title + '</h2>' +
        '<p style="color:#888;font-size:14px;max-width:380px;line-height:1.6;margin-bottom:24px">' + msg + '</p>' +
        '<button onclick="location.reload()" style="background:#e50914;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:Georgia,serif">🔄 Tentar novamente</button>' +
        '</div>';
    }
    window.__loadErrors = 0;
    window.addEventListener('error', function(e) {
      if (e.filename && (e.filename.includes('cdn') || e.filename.includes('unpkg') || e.filename.includes('jsdelivr'))) {
        window.__loadErrors++;
        if (window.__loadErrors >= 2) {
          showFatalError('📶', 'Erro ao carregar o sistema',
            'Não foi possível carregar os arquivos necessários. Verifique sua conexão com a internet e recarregue a página.');
        }
      }
    }, true);
  </script>

    // Verifica carregamento de todas as dependências
    (function checkDeps() {
      var missing = [];
      if (typeof React === 'undefined')    missing.push('React');
      if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
      if (typeof Babel === 'undefined')    missing.push('Babel');
      if (missing.length > 0) {

    })();
