<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>NAIPE FINANCEIRO — Gestão ISP</title>
  <meta name="description" content="Sistema de gestão financeira para provedores de internet" />
  <!-- ═══ DEPENDÊNCIAS DO SISTEMA ═══
       React 18  + Babel standalone (versões fixas e testadas)
       CDN primário: cdnjs (Cloudflare) — mais rápido e confiável globalmente
       CDN backup : jsdelivr
  ═══════════════════════════════════════════════════════════ -->
  <script>
    function showFatalError(icon, title, msg) {
      var r = document.getElementById('root');
      if (r) r.innerHTML =
        '<div style="min-height:100vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;font-family:Georgia,serif;text-align:center">' +
        '<div style="font-size:52px;margin-bottom:16px">' + icon + '</div>' +
        '<h2 style="color:#e50914;font-size:20px;margin-bottom:12px">' + title + '</h2>' +
        '<p style="color:#888;font-size:14px;max-width:380px;line-height:1.6;margin-bottom:24px">' + msg + '</p>' +
        '<button onclick="location.reload()" style="background:#e50914;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:Georgia,serif">🔄 Tentar novamente</button>' +
        '</div>';
    }
    window.__loadErrors = 0;
    window.addEventListener('error', function(e) {
      if (e.filename && (e.filename.includes('cdn') || e.filename.includes('unpkg') || e.filename.includes('jsdelivr'))) {
        window.__loadErrors++;
        if (window.__loadErrors >= 2) {
          showFatalError('📶', 'Erro ao carregar o sistema',
            'Não foi possível carregar os arquivos necessários. Verifique sua conexão com a internet e recarregue a página.');
        }
      }
    }, true);
  </script>

  <!-- React 18 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <!-- React DOM 18 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Babel 7 standalone — necessário para compilar JSX no navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script>
    // Verifica carregamento de todas as dependências
    (function checkDeps() {
      var missing = [];
      if (typeof React === 'undefined')    missing.push('React');
      if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
      if (typeof Babel === 'undefined')    missing.push('Babel');
      if (missing.length > 0) {
        showFatalError('⚠️', 'Componentes não carregados: ' + missing.join(', '),
          'Isso pode acontecer com conexão lenta ou instável. Aguarde alguns segundos e tente recarregar a página.');
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body { background: #0a0a0a; color: #e5e5e5; font-family: Georgia, serif; font-size: 14px; }
    #root { height: 100%; width: 100%; display: flex; flex-direction: column; overflow: hidden; }
    input, select, textarea, button { font-family: Georgia, serif; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    img { max-width: 100%; height: auto; }
    table { table-layout: auto; }

    /* ── Layout shell ── */
    .naipe-app { display: flex; height: 100%; width: 100%; overflow: hidden; }
    .naipe-sidebar { display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; overflow-x: hidden; transition: width 0.2s; }
    .naipe-main { flex: 1; overflow-y: auto; overflow-x: hidden; min-width: 0; }
    .naipe-page { padding: 16px; min-height: 100%; }

    /* ── Tables scroll on small screens ── */
    .naipe-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .naipe-table-wrap table { min-width: 500px; }

    /* ── Responsive breakpoints ── */
    @media (max-width: 480px) {
      body { font-size: 12px; }
      .naipe-sidebar { width: 46px !important; min-width: 46px !important; }
      .naipe-sidebar .nav-label { display: none !important; }
      .naipe-sidebar .nav-badge { display: none !important; }
      .naipe-sidebar .logo-name { display: none !important; }
      .naipe-sidebar .logo-sub  { display: none !important; }
      .naipe-sidebar .side-user { display: none !important; }
      .naipe-sidebar .side-ai   { display: none !important; }
      .naipe-sidebar .nav-btn   { padding: 10px 0 !important; justify-content: center !important; }
      .naipe-page { padding: 10px 8px !important; }
      .grid-2col, .grid-3col { grid-template-columns: 1fr !important; }
      .pheader-actions { flex-wrap: wrap !important; }
    }
    @media (min-width: 481px) and (max-width: 768px) {
      body { font-size: 13px; }
      .naipe-sidebar { width: 52px !important; min-width: 52px !important; }
      .naipe-sidebar .nav-label { display: none !important; }
      .naipe-sidebar .nav-badge { display: none !important; }
      .naipe-sidebar .logo-name { display: none !important; }
      .naipe-sidebar .logo-sub  { display: none !important; }
      .naipe-sidebar .side-user { display: none !important; }
      .naipe-sidebar .side-ai   { display: none !important; }
      .naipe-sidebar .nav-btn   { padding: 12px 0 !important; justify-content: center !important; }
      .naipe-page { padding: 12px 10px !important; }
      .grid-3col { grid-template-columns: 1fr 1fr !important; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .naipe-sidebar { width: 170px !important; }
      .naipe-page { padding: 14px !important; }
    }
    @media (min-width: 1025px) and (max-width: 1280px) {
      .naipe-sidebar { width: 190px !important; }
    }
    @media (min-width: 1281px) {
      .naipe-sidebar { width: 220px !important; }
    }

    /* ── Modal responsive ── */
    .naipe-modal { background: #111; border: 1px solid #2a2a2a; border-radius: 16px; width: 95vw; max-width: 560px; max-height: 92vh; overflow-y: auto; }
    @media (max-width: 480px) {
      .naipe-modal { width: 100vw !important; max-width: 100vw !important; border-radius: 12px 12px 0 0 !important; margin-top: auto !important; max-height: 95vh !important; }
      .naipe-overlay { align-items: flex-end !important; }
    }

    /* ── KPI grid ── */
    .naipe-kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 16px; }
    @media (max-width: 480px) { .naipe-kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; } }
    @media (min-width: 481px) and (max-width: 768px) { .naipe-kpi-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── pHeader ── */
    .naipe-pheader { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }

    /* ── Filter bar ── */
    .naipe-filterbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .naipe-search { flex: 1; min-width: 160px; }
</style>

  <div id="root">
    <div style="min-height:100vh;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Georgia,serif;">
      <div style="width:52px;height:52px;border:2px solid #e50914;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#1a0000;margin-bottom:20px">
        <span style="color:#e50914;font-weight:900;font-size:18px">NF</span>
      </div>
      <div style="color:#fff;font-size:16px;letter-spacing:4px;margin-bottom:8px">Carregando...</div>
      <div style="color:#666;font-size:13px;margin-bottom:32px">Carregando sistema...</div>
      <div style="width:200px;height:3px;background:#1f1f1f;border-radius:3px;overflow:hidden">
        <div style="height:100%;background:#e50914;border-radius:3px;animation:ld 1.5s infinite ease-in-out" id="ldbar"></div>
      </div>
      <style>@keyframes ld{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}</style>
    </div>
    <script>
      // Se demorar mais de 30 segundos, mostra aviso de conexão lenta
      setTimeout(function() {
        var r = document.getElementById('root');
        if (r && r.querySelector('#ldbar')) {
          r.innerHTML += '<div style="color:#555;font-size:12px;margin-top:20px;text-align:center">Carregamento lento... Aguarde ou recarregue a página.</div>';
        }
      }, 30000);
    </script>
  </div>
